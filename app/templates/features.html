<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | ✨ Plus</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f5f5f5; padding-bottom:30px; }
        
        .nav a { text-decoration:none; color:#667eea; font-weight:bold; font-size:0.8em; }
        .container { max-width:650px; margin:15px auto; padding:15px; }
        h2 { text-align:center; margin-bottom:10px; }
        .cat-title { color:#999; margin:20px 0 10px; font-size:0.8em; text-transform:uppercase; letter-spacing:2px; }
        .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
        .card { background:white; border-radius:12px; padding:15px 6px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.06); cursor:pointer; transition:all 0.2s; text-decoration:none; color:inherit; }
        .card:active { transform:scale(0.95); }
        .icon { font-size:1.8em; margin-bottom:4px; display:block; }
        .title { font-weight:600; font-size:0.7em; color:#333; }
        .badge { display:inline-block; padding:2px 5px; border-radius:6px; font-size:0.55em; margin-top:2px; color:white; }
        .b-new { background:#4CAF50; } .b-hot { background:#f44336; } .b-fun { background:#FF9800; }
    body{padding-bottom:60px;}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:rgba(10,10,20,.98);padding:8px 5px 20px;z-index:100;border-top:1px solid rgba(255,255,255,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:rgba(255,255,255,.4);font-size:.6em;gap:2px;padding:5px}
.nav-item span{font-size:1.4em}.nv{font-size:.75em}body{padding-bottom:65px}
</style>
</head>
<body>
                <div class="nav">
        <a href="/dashboard" class="nav-item"><span>🏠</span><span class="nv">Accueil</span></a>
        <a href="/matches" class="nav-item"><span>💕</span><span class="nv">Matches</span></a>
        <a href="/wall" class="nav-item"><span>📢</span><span class="nv">Mur</span></a>
        <a href="/features" class="nav-item"><span>➕</span><span class="nv">Plus</span></a>
        <a href="/profile" class="nav-item"><span>👤</span><span class="nv">Profil</span></a>
    </div>
    <div class="container">
        <h2>✨ Fonctionnalités</h2>
        
        <p class="cat-title">💘 Rencontres</p>
        <div class="grid">
            
            
            <a href="/settings" class="card"><span class="icon">⚙️</span><span class="title">Paramètres</span></a>
        </div>
    </div>
<script src="/static/js/global-player.js"></script>


<script src="/static/js/unified-badge.js"></script>

</body>
</html>
