<script>
let currentIcebreaker = null;

function loadIcebreakers(category = null) {
    const url = category ? `/api/icebreakers?category=${category}` : '/api/icebreakers';
    fetch(url)
        .then(r => r.json())
        .then(data => {
            currentIcebreaker = data.icebreaker;
            document.getElementById('icebreaker-text').textContent = 
                typeof currentIcebreaker === 'string' ? currentIcebreaker : currentIcebreaker.message;
            
            // Catégories
            document.getElementById('ice-categories').innerHTML = 
                data.categories.map(c => 
                    `<button class="cat-btn" onclick="loadIcebreakers('${c}')">${c}</button>`
                ).join('');
        });
}

function newIcebreaker() {
    loadIcebreakers();
}

</script>
