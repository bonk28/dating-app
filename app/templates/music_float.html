<!-- BOUTON MUSIQUE DÉPLAÇABLE -->
<div id="musicFloatBtn" style="position:fixed;bottom:80px;right:20px;width:55px;height:55px;border-radius:50%;background:#1DB954;color:white;border:none;font-size:1.5em;cursor:grab;z-index:9998;box-shadow:0 5px 20px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;" 
     onmousedown="startDrag(event)" ontouchstart="startDrag(event)" ondragstart="return false;">
    🎵
</div>

<div id="musicPanel" style="display:none;position:fixed;bottom:140px;right:20px;width:300px;max-height:400px;background:#1a1a2e;border-radius:15px;z-index:9997;box-shadow:0 10px 35px rgba(0,0,0,0.6);overflow:hidden;">
    <div style="padding:12px 15px;background:#111;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:white;font-weight:bold;">🎵 Musique</span>
        <button onclick="toggleMusic()" style="background:none;border:none;color:#f44336;font-size:1.2em;cursor:pointer;">✕</button>
    </div>
    <div style="padding:10px;">
        <input type="text" id="musicSearch" placeholder="🔍 Chercher une musique..." style="width:100%;padding:12px;border-radius:25px;border:none;background:#333;color:white;font-size:0.9em;outline:none;" onkeypress="if(event.key==='Enter')searchMusic()">
        <button onclick="searchMusic()" style="width:100%;padding:10px;margin-top:8px;background:#1DB954;color:white;border:none;border-radius:25px;cursor:pointer;font-weight:bold;">🔍 Rechercher</button>
    </div>
    <div id="musicResults" style="max-height:250px;overflow-y:auto;padding:0 10px 10px;"></div>
    <div id="nowPlaying" style="padding:8px;background:#000;color:#1DB954;text-align:center;font-size:0.75em;display:none;">
        🔊 <span id="nowPlayingText">---</span>
        <button onclick="stopMusic()" style="background:none;border:none;color:#f44336;cursor:pointer;margin-left:8px;">⏹</button>
    </div>
</div>

<script>
// ====== DRAG & DROP ======
let dragBtn = document.getElementById('musicFloatBtn');
let isDragging = false;
let startX, startY, startLeft, startTop;

function startDrag(e) {
    e.preventDefault();
    isDragging = true;
    dragBtn.style.cursor = 'grabbing';
    
    const touch = e.touches ? e.touches[0] : e;
    startX = touch.clientX;
    startY = touch.clientY;
    
    const rect = dragBtn.getBoundingClientRect();
    startLeft = rect.left;
    startTop = rect.top;
    
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    document.addEventListener('touchmove', onDrag);
    document.addEventListener('touchend', stopDrag);
}

function onDrag(e) {
    if (!isDragging) return;
    const touch = e.touches ? e.touches[0] : e;
    const dx = touch.clientX - startX;
    const dy = touch.clientY - startY;
    
    let newLeft = startLeft + dx;
    let newTop = startTop + dy;
    
    // Limites de l'écran
    newLeft = Math.max(0, Math.min(window.innerWidth - 55, newLeft));
    newTop = Math.max(60, Math.min(window.innerHeight - 55, newTop));
    
    dragBtn.style.left = newLeft + 'px';
    dragBtn.style.top = newTop + 'px';
    dragBtn.style.right = 'auto';
    dragBtn.style.bottom = 'auto';
}

function stopDrag() {
    isDragging = false;
    dragBtn.style.cursor = 'grab';
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.removeEventListener('touchmove', onDrag);
    document.removeEventListener('touchend', stopDrag);
}

// ====== MUSIQUE ======
function toggleMusic() {
    const p = document.getElementById('musicPanel');
    p.style.display = p.style.display === 'none' || p.style.display === '' ? 'block' : 'none';
}

async function searchMusic() {
    const q = document.getElementById('musicSearch').value.trim();
    if (!q) return;
    
    const res = document.getElementById('musicResults');
    res.innerHTML = '<p style="color:white;text-align:center;padding:20px;">🔍 Recherche...</p>';
    
    try {
        const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=15`);
        const d = await r.json();
        
        if (d.results && d.results.length > 0) {
            res.innerHTML = d.results.map(t => `
                <div style="display:flex;align-items:center;gap:8px;padding:8px;cursor:pointer;border-radius:8px;margin:2px 0;color:white;" 
                     onmouseover="this.style.background='rgba(255,255,255,0.1)'" 
                     onmouseout="this.style.background='transparent'"
                     onclick="playTrack('${t.previewUrl || ''}', '${(t.trackName||'').replace(/'/g, "\\'")}', '${(t.artistName||'').replace(/'/g, "\\'")}')">
                    <img src="${t.artworkUrl100}" style="width:45px;height:45px;border-radius:5px;" onerror="this.style.display='none'">
                    <div style="flex:1;overflow:hidden;">
                        <div style="font-size:0.85em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.trackName}</div>
                        <div style="font-size:0.7em;color:#888;">${t.artistName}</div>
                    </div>
                    <span style="color:#1DB954;">${t.previewUrl ? '▶️' : '❌'}</span>
                </div>
            `).join('');
        } else {
            res.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Aucun résultat</p>';
        }
    } catch(e) {
        res.innerHTML = '<p style="color:#f44336;text-align:center;padding:20px;">Erreur</p>';
    }
}

function playTrack(url, title, artist) {
    if (!url) { alert('Aperçu non disponible'); return; }
    if (!window._globalAudio) { window._globalAudio = new Audio(); window._globalAudio.volume = 0.8; }
    window._globalAudio.src = url;
    window._globalAudio.play();
    document.getElementById('nowPlaying').style.display = 'block';
    document.getElementById('nowPlayingText').textContent = title + ' - ' + artist;
}

function stopMusic() {
    if (window._globalAudio) { window._globalAudio.pause(); window._globalAudio.src = ''; }
    document.getElementById('nowPlaying').style.display = 'none';
}
</script>
