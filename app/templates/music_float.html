<div id="musicFloatBtn" style="position:fixed;bottom:20px;right:20px;width:55px;height:55px;border-radius:50%;background:#1DB954;color:white;border:none;font-size:1.5em;cursor:pointer;z-index:9998;box-shadow:0 5px 20px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;" onclick="toggleMusic()">🎵</div>

<div id="musicPanel" style="display:none;position:fixed;bottom:85px;right:20px;width:320px;max-height:450px;background:#1a1a2e;border-radius:15px;z-index:9997;box-shadow:0 10px 35px rgba(0,0,0,0.6);overflow:hidden;">
    <div style="padding:12px 15px;background:#111;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:white;font-weight:bold;">🎵 Musique</span>
        <button onclick="toggleMusic()" style="background:none;border:none;color:#f44336;font-size:1.2em;cursor:pointer;">✕</button>
    </div>
    <div style="padding:10px;">
        <input type="text" id="musicSearch" placeholder="🔍 Chercher une musique..." style="width:100%;padding:12px;border-radius:25px;border:none;background:#333;color:white;font-size:0.9em;outline:none;" onkeypress="if(event.key==='Enter')searchMusic()">
        <button onclick="searchMusic()" style="width:100%;padding:10px;margin-top:8px;background:#1DB954;color:white;border:none;border-radius:25px;cursor:pointer;font-weight:bold;">🔍 Rechercher</button>
    </div>
    <div id="musicResults" style="max-height:250px;overflow-y:auto;padding:0 10px 10px;"></div>
    <div id="nowPlaying" style="padding:8px;background:#000;color:#1DB954;text-align:center;font-size:0.75em;display:none;">
        🔊 <span id="nowPlayingText">---</span>
        <button onclick="stopMusic()" style="background:none;border:none;color:#f44336;cursor:pointer;margin-left:8px;">⏹</button>
    </div>
</div>

<script>
function toggleMusic() {
    const p = document.getElementById('musicPanel');
    p.style.display = p.style.display === 'none' || p.style.display === '' ? 'block' : 'none';
}

async function searchMusic() {
    const q = document.getElementById('musicSearch').value.trim();
    if (!q) return;
    
    const res = document.getElementById('musicResults');
    res.innerHTML = '<p style="color:white;text-align:center;padding:20px;">🔍 Recherche...</p>';
    
    try {
        // API iTunes (gratuite, pas de clé API)
        const r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=15`);
        const d = await r.json();
        
        if (d.results && d.results.length > 0) {
            res.innerHTML = d.results.map((t, i) => `
                <div style="display:flex;align-items:center;gap:8px;padding:8px;cursor:pointer;border-radius:8px;margin:2px 0;color:white;" 
                     onmouseover="this.style.background='rgba(255,255,255,0.1)'" 
                     onmouseout="this.style.background='transparent'"
                     onclick="playTrack('${t.previewUrl ? t.previewUrl.replace(/'/g, "\\'") : ''}', '${t.trackName.replace(/'/g, "\\'")}', '${t.artistName.replace(/'/g, "\\'")}', '${t.artworkUrl100}')">
                    <img src="${t.artworkUrl100}" style="width:45px;height:45px;border-radius:5px;" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2245%22 height=%2245%22><rect fill=%22%23333%22 width=%2245%22 height=%2245%22/><text x=%2212%22 y=%2230%22 fill=%22white%22>🎵</text></svg>'">
                    <div style="flex:1;overflow:hidden;">
                        <div style="font-size:0.85em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.trackName}</div>
                        <div style="font-size:0.7em;color:#888;">${t.artistName}</div>
                    </div>
                    <span style="color:#1DB954;font-size:0.8em;">${t.previewUrl ? '▶️' : '❌'}</span>
                </div>
            `).join('');
        } else {
            res.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">Aucun résultat. Essaye autre chose !</p>';
        }
    } catch(e) {
        res.innerHTML = '<p style="color:#f44336;text-align:center;padding:20px;">Erreur réseau. Réessaie.</p>';
    }
}

function playTrack(url, title, artist, cover) {
    if (!url) {
        alert('🎵 Aperçu non disponible pour ce titre. Essaie une autre chanson.');
        return;
    }
    
    if (!window._globalAudio) {
        window._globalAudio = new Audio();
        window._globalAudio.volume = 0.8;
    }
    
    window._globalAudio.src = url;
    window._globalAudio.play().catch(() => {
        alert('Lecture bloquée par le navigateur. Clique sur une autre chanson.');
    });
    
    document.getElementById('nowPlaying').style.display = 'block';
    document.getElementById('nowPlayingText').textContent = title + ' - ' + artist;
    
    window._globalAudio.onerror = () => {
        document.getElementById('nowPlayingText').textContent = 'Erreur lecture - ' + title;
    };
}

function stopMusic() {
    if (window._globalAudio) {
        window._globalAudio.pause();
        window._globalAudio.src = '';
    }
    document.getElementById('nowPlaying').style.display = 'none';
}
</script>
