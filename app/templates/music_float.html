<style>
    #musicFloatingBtn {
        position:fixed;bottom:100px;right:15px;width:50px;height:50px;
        border-radius:50%;background:linear-gradient(135deg,#1DB954,#00e676);
        color:white;border:none;font-size:1.3em;cursor:grab;z-index:9998;
        box-shadow:0 5px 25px rgba(29,185,84,.5);
        display:flex;align-items:center;justify-content:center;
        touch-action:none;user-select:none;transition:transform .2s;
    }
    #musicFloatingBtn:active{cursor:grabbing;transform:scale(1.1);}
    #musicFloatingBtn.dragging{cursor:grabbing;}
    
    #musicMiniBar {
        position:fixed;bottom:75px;left:10px;right:10px;
        background:rgba(10,10,20,.98);border-radius:15px;
        padding:8px 12px;display:none;align-items:center;gap:10px;
        z-index:99;border:1px solid rgba(255,255,255,.1);
        backdrop-filter:blur(20px);animation:slideUp .3s ease;
    }
    @keyframes slideUp{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
    #musicMiniBar.show{display:flex;}
    #musicMiniBar .cover{width:38px;height:38px;border-radius:8px;background:#1DB954;display:flex;align-items:center;justify-content:center;font-size:1.2em;}
    #musicMiniBar .info{flex:1;overflow:hidden;}
    #musicMiniBar .title{font-size:.8em;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    #musicMiniBar .artist{font-size:.65em;opacity:.6;}
    #musicMiniBar button{background:none;border:none;color:white;font-size:1.2em;cursor:pointer;padding:5px;}
    
    #musicSearchPanel {
        position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;
        border-radius:25px 25px 0 0;z-index:200;display:none;
        max-height:65vh;overflow-y:auto;box-shadow:0 -20px 50px rgba(0,0,0,.8);
    }
    #musicSearchPanel.show{display:block;animation:slideUp .3s ease;}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:rgba(10,10,20,.98);padding:8px 5px 20px;z-index:100;border-top:1px solid rgba(255,255,255,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:rgba(255,255,255,.4);font-size:.6em;gap:2px;padding:5px}
.nav-item span{font-size:1.4em}.nv{font-size:.75em}body{padding-bottom:65px}
</style>

<div id="musicFloatingBtn" onmousedown="startDragMusic(event)" ontouchstart="startDragMusic(event)">🎵</div>

<div id="musicMiniBar">
    <div class="cover" id="miniCover">🎵</div>
    <div class="info">
        <div class="title" id="miniTitle">Aucune musique</div>
        <div class="artist" id="miniArtist">---</div>
    </div>
    <button onclick="toggleMusicPlay()" id="miniPlay">▶️</button>
    <button onclick="nextMusicTrack()">⏭</button>
    <button onclick="openMusicSearch()">🔍</button>
    <button onclick="stopAllMusic()" style="color:#ff5252;">✕</button>
</div>

<div id="musicSearchPanel">
    <div style="background:#111;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;border-radius:25px 25px 0 0;">
        <h4 style="color:white;">🎵 Rechercher</h4>
        <button onclick="closeMusicSearch()" style="background:none;border:none;color:white;font-size:1.3em;cursor:pointer;">✕</button>
    </div>
    <div style="padding:15px;">
        <input type="text" id="musicSearchInput" placeholder="🔍 Titre ou artiste..." style="width:100%;padding:14px;border-radius:25px;border:none;background:#333;color:white;font-size:1em;outline:none;" onkeypress="if(event.key==='Enter')searchMusicOnline()">
    </div>
    <div id="musicSearchResults" style="padding:10px;max-height:50vh;overflow-y:auto;"></div>
</div>

<audio id="globalAudio" style="display:none;"></audio>

<script>
(function(){
    var audio = document.getElementById('globalAudio');
    var playlist = JSON.parse(localStorage.getItem('globalPlaylist') || '[]');
    var currentIndex = parseInt(localStorage.getItem('globalTrackIndex') || '-1');
    var isPlaying = false;
    audio.volume = 0.8;
    
    // Restaurer si une musique était en cours
    if (currentIndex >= 0 && playlist[currentIndex]) {
        audio.src = playlist[currentIndex].dataUrl;
        var t = playlist[currentIndex];
        document.getElementById('miniTitle').textContent = t.title;
        document.getElementById('miniArtist').textContent = t.artist;
        document.getElementById('musicMiniBar').classList.add('show');
        audio.currentTime = parseFloat(localStorage.getItem('globalTrackTime') || '0');
    }
    
    audio.ontimeupdate = function() {
        localStorage.setItem('globalTrackTime', audio.currentTime);
    };
    
    audio.onplay = function() { isPlaying = true; document.getElementById('miniPlay').textContent = '⏸️'; };
    audio.onpause = function() { isPlaying = false; document.getElementById('miniPlay').textContent = '▶️'; };
    audio.onended = function() { nextMusicTrack(); };
    
    function saveState() {
        localStorage.setItem('globalPlaylist', JSON.stringify(playlist));
        localStorage.setItem('globalTrackIndex', currentIndex);
        localStorage.setItem('globalTrackTime', audio.currentTime);
    }
    
    window.toggleMusicPlay = function() {
        if (currentIndex < 0 && playlist.length > 0) { playTrack(0); return; }
        if (isPlaying) { audio.pause(); } else { audio.play(); }
    };
    
    window.playTrack = function(index) {
        if (index < 0 || index >= playlist.length) return;
        currentIndex = index;
        var t = playlist[index];
        audio.src = t.dataUrl;
        audio.play();
        document.getElementById('miniTitle').textContent = t.title;
        document.getElementById('miniArtist').textContent = t.artist;
        document.getElementById('miniCover').textContent = '🎵';
        document.getElementById('musicMiniBar').classList.add('show');
        saveState();
    };
    
    window.nextMusicTrack = function() {
        if (playlist.length === 0) return;
        playTrack((currentIndex + 1) % playlist.length);
    };
    
    window.stopAllMusic = function() {
        audio.pause(); audio.src = '';
        currentIndex = -1; isPlaying = false;
        document.getElementById('musicMiniBar').classList.remove('show');
        localStorage.removeItem('globalTrackIndex');
        localStorage.removeItem('globalTrackTime');
    };
    
    window.openMusicSearch = function() {
        document.getElementById('musicSearchPanel').classList.add('show');
        document.getElementById('musicSearchInput').focus();
    };
    
    window.closeMusicSearch = function() {
        document.getElementById('musicSearchPanel').classList.remove('show');
    };
    
    window.searchMusicOnline = async function() {
        var q = document.getElementById('musicSearchInput').value.trim();
        if (!q) return;
        var res = document.getElementById('musicSearchResults');
        res.innerHTML = '<p style="color:white;text-align:center;padding:20px;">🔍 Recherche...</p>';
        try {
            var r = await fetch('https://itunes.apple.com/search?term='+encodeURIComponent(q)+'&media=music&limit=25');
            var d = await r.json();
            if (d.results && d.results.length > 0) {
                res.innerHTML = d.results.map(function(t){
                    return '<div onclick="addGlobalTrack(\''+(t.previewUrl||'')+'\',\''+(t.trackName||'').replace(/'/g,'')+'\',\''+(t.artistName||'').replace(/'/g,'')+'\')" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;cursor:pointer;color:white;"><img src="'+t.artworkUrl100+'" style="width:45px;height:45px;border-radius:8px;" onerror="this.style.display=\'none\'"><div style="flex:1;overflow:hidden;"><div style="font-weight:600;font-size:.9em;">'+t.trackName+'</div><div style="font-size:.7em;opacity:.6;">'+t.artistName+'</div></div><span style="color:#1DB954;">'+(t.previewUrl?'▶️':'❌')+'</span></div>';
                }).join('');
            } else {
                res.innerHTML = '<p style="color:#888;text-align:center;padding:30px;">Aucun résultat</p>';
            }
        } catch(e) {
            res.innerHTML = '<p style="color:#f44336;text-align:center;padding:20px;">Erreur</p>';
        }
    };
    
    window.addGlobalTrack = function(url, title, artist) {
        if (!url) { alert('Aperçu non disponible'); return; }
        playlist.push({title:title, artist:artist, dataUrl:url});
        saveState();
        if (currentIndex < 0) playTrack(playlist.length-1);
        closeMusicSearch();
    };
    
    // ---- DRAG & DROP ----
    var btn = document.getElementById('musicFloatingBtn');
    var isDragging = false, startX, startY, startLeft, startTop;
    
    window.startDragMusic = function(e) {
        isDragging = false;
        var t = e.touches ? e.touches[0] : e;
        startX = t.clientX; startY = t.clientY;
        var rect = btn.getBoundingClientRect();
        startLeft = rect.left; startTop = rect.top;
        document.addEventListener('mousemove', onDragMusic);
        document.addEventListener('mouseup', stopDragMusic);
        document.addEventListener('touchmove', onDragMusic);
        document.addEventListener('touchend', stopDragMusic);
    };
    
    function onDragMusic(e) {
        var t = e.touches ? e.touches[0] : e;
        var dx = t.clientX - startX, dy = t.clientY - startY;
        if (Math.abs(dx) > 5 || Math.abs(dy) > 5) isDragging = true;
        if (!isDragging) return;
        btn.style.left = Math.max(0, Math.min(window.innerWidth-50, startLeft+dx)) + 'px';
        btn.style.top = Math.max(60, Math.min(window.innerHeight-50, startTop+dy)) + 'px';
        btn.style.right = 'auto'; btn.style.bottom = 'auto';
    }
    
    function stopDragMusic() {
        document.removeEventListener('mousemove', onDragMusic);
        document.removeEventListener('mouseup', stopDragMusic);
        document.removeEventListener('touchmove', onDragMusic);
        document.removeEventListener('touchend', stopDragMusic);
        if (!isDragging) openMusicSearch();
    }
    
    // Sauvegarder la position du bouton
    btn.addEventListener('mouseup', function() {
        if (!isDragging) {
            localStorage.setItem('musicBtnPos', JSON.stringify({left:btn.style.left,top:btn.style.top}));
        }
    });
    
    // Restaurer la position
    var savedPos = JSON.parse(localStorage.getItem('musicBtnPos') || '{}');
    if (savedPos.left) { btn.style.left = savedPos.left; btn.style.top = savedPos.top; btn.style.right = 'auto'; btn.style.bottom = 'auto'; }
})();
</script>
