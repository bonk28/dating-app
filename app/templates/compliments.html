<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Compliments</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ff6b6b, #ee5a24); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 350px; width: 90%; }
        .card {
            background: white; border-radius: 20px; padding: 30px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h2 { margin-bottom: 20px; }
        .compliment {
            font-size: 1.3em; padding: 20px; margin: 10px 0;
            background: #fff5f5; border-radius: 15px; cursor: pointer;
            transition: transform 0.2s;
        }
        .compliment:hover { transform: scale(1.05); background: #ffe0e0; }
    body{padding-bottom:60px;}
</style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>💝 Envoyer un compliment</h2>
            {% for compliment in compliments %}
            <div class="compliment" onclick="sendCompliment('{{ compliment }}')">
                {{ compliment }}
            </div>
            {% endfor %}
            <a href="javascript:history.back()" style="display:block;margin-top:20px;color:#666;">← Retour</a>
        </div>
    </div>
    <script>
        function sendCompliment(msg) {
            alert('💌 Compliment envoyé : ' + msg);
        }
    </script>
</body>
</html>
