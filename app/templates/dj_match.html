<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | DJ Match 🎧</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1DB954, #191414); color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { text-align: center; font-size: 2.5em; }
        .genre-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin: 10px 0; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .genre-card:hover { background: rgba(255,255,255,0.2); }
        .genre-icon { font-size: 2.5em; }
        .genre-info { flex: 1; }
        .genre-bar { height: 5px; background: rgba(255,255,255,0.2); border-radius: 5px; margin-top: 8px; overflow: hidden; }
        .genre-fill { height: 100%; border-radius: 5px; }
        .match-btn { display: block; width: 100%; padding: 20px; margin-top: 20px; background: #1DB954; color: white; border: none; border-radius: 50px; font-size: 1.3em; cursor: pointer; font-weight: bold; }
    
    
    .nav-item.active{color:#ff2d78}
    
    .nav-item.active 
    

body{padding-bottom:80px;}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:rgba(10,10,20,.98);padding:8px 5px 20px;z-index:100;border-top:1px solid rgba(255,255,255,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:rgba(255,255,255,.4);font-size:.6em;gap:2px;padding:5px}
.nav-item span{font-size:1.4em}.nv{font-size:.75em}body{padding-bottom:65px}
</style>
</head>
<body>
    <div class="container">
        <h1>🎧 DJ Match</h1>
        <p style="text-align:center;">Trouve quelqu'un qui a les mêmes goûts musicaux !</p>
        
        <div class="genre-card" onclick="selectGenre('pop')">
            <div class="genre-icon">🎤</div>
            <div class="genre-info">
                <strong>Pop</strong>
                <div class="genre-bar"><div class="genre-fill" style="width:85%;background:#FF69B4;"></div></div>
                <small>85% compatible</small>
            </div>
        </div>
        <div class="genre-card" onclick="selectGenre('rock')">
            <div class="genre-icon">🎸</div>
            <div class="genre-info">
                <strong>Rock</strong>
                <div class="genre-bar"><div class="genre-fill" style="width:60%;background:#f44336;"></div></div>
                <small>60% compatible</small>
            </div>
        </div>
        <div class="genre-card" onclick="selectGenre('electro')">
            <div class="genre-icon">🎹</div>
            <div class="genre-info">
                <strong>Électro</strong>
                <div class="genre-bar"><div class="genre-fill" style="width:72%;background:#2196F3;"></div></div>
                <small>72% compatible</small>
            </div>
        </div>
        
        <button class="match-btn" onclick="findDJMatch()">🎵 Trouver mon DJ Match</button>
    </div>
    <script>
        function selectGenre(g) { alert('Genre sélectionné : ' + g); }
        function findDJMatch() { alert('🎉 23 profils compatibles trouvés !'); }
    </script>

<script src="/static/js/unified-badge.js"></script>

</body>
</html>
