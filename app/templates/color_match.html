<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Color Match 🎨</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; text-align: center; }
        .color-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .color { height: 80px; border-radius: 15px; cursor: pointer; transition: transform 0.2s; }
        .color:hover { transform: scale(1.1); }
        .selected { border: 4px solid #333; }
        .result { background: white; border-radius: 20px; padding: 30px; margin: 20px 0; }
    
    
    .nav-item.active{color:#ff2d78}
    
    .nav-item.active 
    

body{padding-bottom:80px;}
</style>
</head>
<body>
    <div class="container">
        <h1>🎨 Color Match</h1>
        <p>Choisis ta couleur préférée, trouve quelqu'un qui aime la même !</p>
        
        <div class="color-picker" id="colors">
            <div class="color" style="background:#f44336;" onclick="selectColor('red')"></div>
            <div class="color" style="background:#2196F3;" onclick="selectColor('blue')"></div>
            <div class="color" style="background:#4CAF50;" onclick="selectColor('green')"></div>
            <div class="color" style="background:#FF9800;" onclick="selectColor('orange')"></div>
            <div class="color" style="background:#9C27B0;" onclick="selectColor('purple')"></div>
            <div class="color" style="background:#FFEB3B;" onclick="selectColor('yellow')"></div>
            <div class="color" style="background:#00BCD4;" onclick="selectColor('cyan')"></div>
            <div class="color" style="background:#FF69B4;" onclick="selectColor('pink')"></div>
        </div>
        
        <div class="result" id="result">
            <p>👆 Choisis une couleur pour trouver ton match chromatique !</p>
        </div>
        
        <a href="/dashboard">← Retour</a>
    </div>
    <script>
        const colorNames = { red: '❤️ Rouge Passion', blue: '💙 Bleu Sérénité', green: '💚 Vert Nature', orange: '🧡 Orange Énergie', purple: '💜 Violet Mystère', yellow: '💛 Jaune Soleil', cyan: '🩵 Cyan Fraîcheur', pink: '🩷 Rose Douceur' };
        function selectColor(color) {
            document.querySelectorAll('.color').forEach(c => c.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById('result').innerHTML = `<h2>${colorNames[color]}</h2><p>🌟 ${Math.floor(Math.random()*50+50)} personnes partagent ta couleur !</p><button style="padding:15px 30px;background:#667eea;color:white;border:none;border-radius:25px;cursor:pointer;">🔍 Voir les profils ${colorNames[color].split(' ')[0]}</button>`;
        }
    </script>

<script src="/static/js/unified-badge.js"></script>

</body>
</html>
