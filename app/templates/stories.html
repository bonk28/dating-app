<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 Stories</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#000;color:white;padding-bottom:60px}
        .header{padding:15px;display:flex;align-items:center;gap:15px;background:#111}
        .header a{color:white;text-decoration:none;font-size:1.2em}
        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;padding:2px}
        .card{aspect-ratio:9/16;background:#1a1a1a;cursor:pointer;position:relative;overflow:hidden}
        .card img,.card video{width:100%;height:100%;object-fit:cover}
        .add{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #333}
        .info{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
        .viewer{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;z-index:2000;display:none;flex-direction:column}
        .viewer img,.viewer video{flex:1;object-fit:contain;width:100%}
        .close{position:absolute;top:15px;right:15px;font-size:2em;cursor:pointer;z-index:10}
        .bottom{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
        .reactions{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
        .rbtn{background:rgba(255,255,255,.15);padding:10px 16px;border-radius:25px;cursor:pointer;font-size:1.3em;border:none;color:white}
        .reply-box{display:flex;gap:10px}
        .reply-box input{flex:1;padding:12px;border-radius:25px;border:none;background:rgba(255,255,255,.15);color:white}
        .reply-box button{padding:12px 20px;border-radius:25px;border:none;background:#e91e63;color:white;font-weight:bold;cursor:pointer}
    </style>
</head>
<body>
    <div class="header"><a href="/profile">←</a><h2>📸 Mes Stories</h2></div>
    <div class="grid" id="grid">
        <div class="card add" onclick="document.getElementById('file').click()">
            <span style="font-size:3em;">➕</span><small style="color:#888;">Ajouter</small>
        </div>
    </div>
    <input type="file" id="file" accept="image/*,video/*" style="display:none" onchange="addStory(this.files[0])">
    
    <div class="viewer" id="viewer">
        <span class="close" onclick="document.getElementById('viewer').style.display='none'">✕</span>
        <div id="media" style="flex:1;display:flex;align-items:center;justify-content:center;"></div>
        <div class="bottom">
            <div class="reactions">
                <button class="rbtn" onclick="react('❤️')">❤️</button><button class="rbtn" onclick="react('😂')">😂</button>
                <button class="rbtn" onclick="react('🔥')">🔥</button><button class="rbtn" onclick="react('😍')">😍</button>
                <button class="rbtn" onclick="react('👏')">👏</button>
            </div>
            <div class="reply-box">
                <input type="text" id="ri" placeholder="Commenter...">
                <button onclick="reply()">Envoyer</button>
            </div>
        </div>
    </div>

    <script>
        var stories = JSON.parse(localStorage.getItem('stories') || '[]'), cur = 0;
        
        function addStory(file) {
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                stories.unshift({
                    type: file.type.startsWith('video') ? 'video' : 'image',
                    dataUrl: e.target.result,
                    time: new Date().toLocaleString(),
                    reactions: [],
                    comments: []
                });
                localStorage.setItem('stories', JSON.stringify(stories));
                render();
                if (typeof addNotif !== 'undefined') addNotif('📸', 'Story publiée !', 'Ta story est en ligne');
            };
            reader.readAsDataURL(file);
        }
        
        function render() {
            var g = document.getElementById('grid');
            g.innerHTML = '<div class="card add" onclick="document.getElementById(\'file\').click()"><span style="font-size:3em;">➕</span><small style="color:#888;">Ajouter</small></div>' +
                stories.map(function(s, i) {
                    return '<div class="card" onclick="view('+i+')">' +
                        (s.type === 'video' ? '<video src="'+s.dataUrl+'"></video>' : '<img src="'+s.dataUrl+'">') +
                        '<div class="info"><b>Moi</b><br><small>'+s.reactions.length+' réactions</small></div></div>';
                }).join('');
        }
        
        function view(i) {
            cur = i;
            var s = stories[i];
            document.getElementById('media').innerHTML = s.type === 'video' 
                ? '<video src="'+s.dataUrl+'" autoplay loop controls style="max-width:100%;max-height:100%;"></video>'
                : '<img src="'+s.dataUrl+'" style="max-width:100%;max-height:100%;">';
            document.getElementById('viewer').style.display = 'flex';
            document.getElementById('ri').value = '';
        }
        
        function react(e) {
            stories[cur].reactions.push(e);
            localStorage.setItem('stories', JSON.stringify(stories));
            render();
            var d = document.createElement('div');
            d.textContent = e; d.style.cssText = 'position:fixed;font-size:3em;animation:up 1s forwards;z-index:3000;left:50%;bottom:150px;';
            document.body.appendChild(d); setTimeout(function() { d.remove(); }, 1000);
        }
        
        function reply() {
            var t = document.getElementById('ri').value.trim();
            if (!t) return;
            stories[cur].comments.push({ text: t, time: new Date().toLocaleTimeString() });
            localStorage.setItem('stories', JSON.stringify(stories));
            document.getElementById('ri').value = '';
            if (typeof addNotif !== 'undefined') addNotif('💬', 'Commentaire story', t);
            alert('💬 Commentaire ajouté !');
        }
        
        var s = document.createElement('style');
        s.textContent = '@keyframes up{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-200px)scale(2.5)}}';
        document.head.appendChild(s);
        render();
    </script>
<script src="/static/js/unified-badge.js"></script>
</body>
</html>
