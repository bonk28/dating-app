<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Météo de l'Amour 🌦️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ff9a9e, #fad0c4); min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .card { background: white; border-radius: 30px; padding: 40px; max-width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .weather-icon { font-size: 8em; animation: float 2s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .temp { font-size: 4em; font-weight: bold; background: linear-gradient(135deg, #ff6b6b, #ee5a24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .advice { font-style: italic; color: #666; margin: 15px 0; }
    
    
    .nav-item.active{color:#ff2d78}
    
    .nav-item.active 
    

body{padding-bottom:80px;}
</style>
</head>
<body>
    <div class="card">
        <div class="weather-icon" id="icon">☀️</div>
        <div class="temp" id="temp">85%</div>
        <h2>Météo de l'Amour</h2>
        <p class="advice" id="advice">Aujourd'hui, l'amour est dans l'air ! C'est le jour parfait pour swiper.</p>
        <button onclick="refreshWeather()" style="padding:15px 30px;background:#667eea;color:white;border:none;border-radius:25px;cursor:pointer;margin-top:15px;">🔄 Actualiser</button>
    </div>
    <script>
        function refreshWeather() {
            const weathers = [
                { icon: '☀️', temp: '92%', advice: 'Soleil radieux ! Tes chances de match sont au maximum.' },
                { icon: '⛅', temp: '65%', advice: 'Quelques nuages... mais l\'amour peut surgir à tout moment.' },
                { icon: '🌈', temp: '78%', advice: 'Un arc-en-ciel de possibilités amoureuses aujourd\'hui.' },
                { icon: '⚡', temp: '55%', advice: 'Coup de foudre possible ! Reste attentif/attentive.' },
            ];
            const w = weathers[Math.floor(Math.random()*weathers.length)];
            document.getElementById('icon').textContent = w.icon;
            document.getElementById('temp').textContent = w.temp;
            document.getElementById('advice').textContent = w.advice;
        }
    </script>

<script src="/static/js/unified-badge.js"></script>
{% include 'music_float.html' %}
</body>
</html>
