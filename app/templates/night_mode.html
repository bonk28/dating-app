<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mode Nuit 🌙</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; text-align: center; }
        h1 { color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .moon { font-size: 5em; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .profile-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; margin: 15px 0; border: 1px solid rgba(255,215,0,0.2); }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 2s infinite; }
        @keyframes twinkle { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="moon">🌙</div>
        <h1>Mode Nuit</h1>
        <p style="color:#aaa;">Profils mystérieux qui brillent dans l'obscurité</p>
        
        <div class="profile-card">
            <p style="font-size:2em;">🌟</p>
            <h3>Profil mystère #1</h3>
            <p>"Amoureux de la nuit et des étoiles"</p>
            <button style="padding:10px 30px;background:#ffd700;color:black;border:none;border-radius:20px;margin:10px;cursor:pointer;">✨ Révéler</button>
        </div>
        
        <a href="/dashboard" style="color:white;">← Retour</a>
    </div>
    <script>
        // Créer des étoiles
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = star.style.height = Math.random() * 3 + 'px';
            star.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('stars').appendChild(star);
        }
    </script>
</body>
</html>
