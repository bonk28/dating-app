<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Blind Date - Dating App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .blind-header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .blind-header h1 { font-size: 1.5em; }
        .mystery-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
        }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 20px;
            word-wrap: break-word;
        }
        .message-sent {
            background: #667eea;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .message-received {
            background: rgba(255,255,255,0.2);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .reveal-btn {
            display: block;
            margin: 10px auto;
            padding: 15px 30px;
            background: linear-gradient(135deg, #f44336, #ff6b6b);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            font-weight: bold;
        }
        .timer {
            text-align: center;
            padding: 10px;
            color: #aaa;
            font-size: 0.9em;
        }
        .mood-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            font-size: 1.5em;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
        }
        .input-container {
            padding: 15px;
            background: rgba(255,255,255,0.1);
            display: flex;
            gap: 10px;
        }
        .message-input {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            outline: none;
        }
        .message-input::placeholder { color: #aaa; }
        .send-btn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }
    
    
    .nav-item.active{color:#ff2d78}

body{padding-bottom:80px;}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:rgba(10,10,20,.98);padding:8px 5px 20px;z-index:100;border-top:1px solid rgba(255,255,255,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:rgba(255,255,255,.4);font-size:.6em;gap:2px;padding:5px}
.nav-item span{font-size:1.4em}.nv{font-size:.75em}body{padding-bottom:65px}
</style>
</head>
<body>
    <div class="blind-header">
        <div class="mystery-avatar">🎭</div>
        <h1>Blind Date</h1>
        <p>Faites connaissance sans préjugés</p>
    </div>

    <div class="timer">⏰ Temps restant : <span id="timer">05:00</span></div>

    <div class="messages-container" id="messages">
        <div class="message message-received">
            Bienvenue ! Vous avez 5 minutes pour faire connaissance. Après, vous pourrez voir vos profils !
        </div>
    </div>

    <div style="padding:10px;display:flex;justify-content:center;flex-wrap:wrap;" id="moods">
        {% for mood in moods %}
        <button class="mood-btn" onclick="sendMood('{{ mood }}')">{{ mood }}</button>
        {% endfor %}
    </div>

    <div class="input-container">
        <input type="text" class="message-input" id="messageInput" placeholder="Votre message..." autocomplete="off">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <button class="reveal-btn" onclick="revealProfiles()" id="revealBtn">
        👁️ Révéler les profils
    </button>

    <script>
        let timeLeft = 300; // 5 minutes
        let canReveal = false;
        
        const timer = setInterval(() => {
            timeLeft--;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                document.getElementById('timer').textContent = 'Terminé !';
                canReveal = true;
                document.getElementById('revealBtn').style.background = '#4CAF50';
            }
        }, 1000);
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) return;
            
            // Ajouter au chat
            const msgs = document.getElementById('messages');
            msgs.innerHTML += `
                <div class="message message-sent">${content}</div>
            `;
            input.value = '';
            msgs.scrollTop = msgs.scrollHeight;
        }
        
        function sendMood(mood) {
            const msgs = document.getElementById('messages');
            msgs.innerHTML += `
                <div class="message message-sent" style="font-size:2em;">${mood}</div>
            `;
            msgs.scrollTop = msgs.scrollHeight;
        }
        
        function revealProfiles() {
            if (timeLeft > 0 && !confirm('Voulez-vous vraiment révéler les profils maintenant ?')) {
                return;
            }
            alert('Profils révélés ! Redirection...');
            window.location.href = '/chat/{{ match.id }}';
        }
    </script>

<script src="/static/js/unified-badge.js"></script>

</body>
</html>
