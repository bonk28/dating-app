<html lang="fr">
<head>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1DB954, #191414); color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { text-align: center; }
        .playlist { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin: 15px 0; }
        .song { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; cursor: pointer; }
        .song:hover { background: rgba(255,255,255,0.2); }
        .song-icon { font-size: 2em; }
    
    
    .nav-item.active{color:#ff2d78}

body{padding-bottom:80px;}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:rgba(10,10,20,.98);padding:8px 5px 20px;z-index:100;border-top:1px solid rgba(255,255,255,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:rgba(255,255,255,.4);font-size:.6em;gap:2px;padding:5px}
.nav-item span{font-size:1.4em}.nv{font-size:.75em}body{padding-bottom:65px}
</style>
</head>
<body>
    <div class="container">
        <h1>🎵 Music Match</h1>
        <p style="text-align:center">Goûts musicaux communs avec {{ other_user.username }}</p>
        
        <div class="playlist">
            <h3>🎸 Artistes que vous pourriez aimer</h3>
            <div class="song"><span class="song-icon">🎵</span> The Weeknd - Blinding Lights</div>

            <div class="song"><span class="song-icon">🎵</span> Stromae - Alors on danse</div>
        </div>
        
        <div class="playlist">
            <h3>❤️ Vos styles communs</h3>
            <p>Pop, Electro, RnB</p>
        </div>
        
        <a href="/chat/{{ match.id }}" style="color:white;display:block;text-align:center;margin-top:20px;">← Retour au chat</a>
    </div>

<script src="/static/js/unified-badge.js"></script>
