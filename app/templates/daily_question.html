<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Question du jour - Dating App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 400px; width: 90%; }
        .card {
            background: white; border-radius: 20px; padding: 30px;
            text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h2 { margin-bottom: 10px; color: #333; }
        .question { font-size: 1.3em; margin: 20px 0; color: #333; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 20px; border: 3px solid #e0e0e0; border-radius: 15px;
            cursor: pointer; font-size: 1.2em; transition: all 0.3s;
        }
        .option:hover { border-color: #667eea; background: #667eea10; }
        .option.selected { border-color: #667eea; background: #667eea20; font-weight: bold; }
        .back-link { display: block; margin-top: 20px; color: white; text-align: center; text-decoration: none; }
    
    
    .nav-item.active{color:#ff2d78}
    
    .nav-item.active 
    

body{padding-bottom:80px;}
</style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>📊 Question du jour</h2>
            <div class="question" id="question">Chargement...</div>
            <div class="options" id="options"></div>
        </div>
        <a href="/features" class="back-link">← Retour</a>
    </div>

    <script>
        fetch('/api/daily-question')
            .then(r => r.json())
            .then(data => {
                document.getElementById('question').textContent = data.question;
                document.getElementById('options').innerHTML = `
                    <div class="option ${data.user_answer === 'A' ? 'selected' : ''}" 
                         onclick="vote(${data.id}, 'A')">${data.option_a}</div>
                    <div class="option ${data.user_answer === 'B' ? 'selected' : ''}" 
                         onclick="vote(${data.id}, 'B')">${data.option_b}</div>
                `;
            });
        
        function vote(questionId, answer) {
            fetch('/api/daily-question/' + questionId, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({answer: answer})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                    event.target.classList.add('selected');
                }
            });
        }
    </script>

<script src="/static/js/unified-badge.js"></script>
{% include 'music_float.html' %}
</body>
</html>
