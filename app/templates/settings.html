<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Paramètres</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;}
        .header{background:white;padding:20px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        .header a{color:#667eea;text-decoration:none;font-size:1.3em;}
        .container{max-width:500px;margin:20px auto;padding:20px;}
        .section{background:white;border-radius:15px;padding:20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
        .section h3{margin-bottom:15px;color:#333;}
        .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #16213e;}
        .row:last-child{border-bottom:none;}
        .toggle{width:55px;height:28px;background:#ccc;border-radius:14px;cursor:pointer;position:relative;transition:background 0.3s;}
        .toggle.active{background:#4CAF50;}
        .toggle::after{content:'';width:24px;height:24px;background:white;border-radius:50%;position:absolute;top:2px;left:2px;transition:left 0.3s;}
        .toggle.active::after{left:29px;}
        .link-item{display:flex;align-items:center;gap:12px;padding:15px;text-decoration:none;color:#333;border-radius:10px;margin:5px 0;}
        .link-item:hover{background:#f5f5f5;}
        .link-icon{font-size:1.5em;min-width:35px;text-align:center;}
        .link-info{flex:1;}
        .link-title{font-weight:500;}
        .link-sub{font-size:0.8em;color:#999;}
        .link-arrow{color:#ccc;}
        .btn-link{display:block;width:100%;padding:15px;text-align:center;background:white;border:2px solid #667eea;color:#667eea;text-decoration:none;border-radius:10px;font-weight:bold;margin-top:10px;}
    body{padding-bottom:60px;}

    
    .nav-item.active{color:#ff2d78}
    
    .nav-item.active 
    

</style>
</head>
<body>
    <div class="header">
        <a href="/features">←</a>
        <h2>⚙️ Paramètres</h2>
    </div>
    <div class="container">
        <div class="section">
            <h3>🔕 Notifications</h3>
            <div class="row">
                <span>Mode Ne pas déranger</span>
                <div class="toggle" id="dndToggle" onclick="toggleDND()"></div>
            </div>
        </div>
        
        <div class="section">
            <h3>🎨 Apparence</h3>
            <div class="row">
                <span>Mode sombre</span>
                <div class="toggle" id="themeToggle" onclick="toggleTheme()"></div>
            </div>
        </div>
        
        <div class="section">
            <h3>ℹ️ Informations</h3>
            <a href="/about" class="link-item">
                <span class="link-icon">👨‍💻</span>
                <div class="link-info">
                    <div class="link-title">À propos du créateur</div>
                    <div class="link-sub">Kevin BonkounGou</div>
                </div>
                <span class="link-arrow">›</span>
            </a>
            <a href="/delete-account" class="link-item">
                <span class="link-icon">🗑️</span>
                <div class="link-info">
                    <div class="link-title">Supprimer mon compte</div>
                    <div class="link-sub" style="color:#f44336;">Action irréversible</div>
                </div>
                <span class="link-arrow">›</span>
            </a>
        </div>
        
        <div class="section" style="text-align:center;">
            <p style="color:#666;font-size:0.9em;">Développé avec ❤️</p>
            <p style="color:#333;font-weight:bold;">Kevin BonkounGou</p>
            <p style="color:#999;font-size:0.8em;">bonkoungoukevin34@gmail.com</p>
            <p style="color:#aaa;font-size:0.7em;margin-top:5px;">Version 2.0 • 2026</p>
        </div>
    </div>
    
    <script>
        function toggleDND(){
            fetch('/api/dnd/toggle',{method:'POST'}).then(r=>r.json()).then(d=>{
                document.getElementById('dndToggle').classList.toggle('active',d.dnd_active);
            });
        }
        function toggleTheme(){
            const dark=!document.body.classList.contains('dark');
            document.body.classList.toggle('dark',dark);
            localStorage.setItem('theme',dark?'dark':'light');
            document.getElementById('themeToggle').classList.toggle('active',dark);
        }
        
        if(localStorage.getItem('theme')==='dark'){
            document.body.classList.add('dark');
            document.getElementById('themeToggle').classList.add('active');
        }
    </script>
    

<script src="/static/js/unified-badge.js"></script>

</body>
</html>
