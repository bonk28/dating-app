<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💎 Dating App</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:#000;color:white;overflow-x:hidden;min-height:100vh}
        
        /* ANIMATION DE FOND */
        .bg-anim{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.4;animation:orbFloat 8s ease-in-out infinite}
        .orb1{width:300px;height:300px;background:#ff2d78;top:10%;left:-10%;animation-delay:0s}
        .orb2{width:250px;height:250px;background:#00e5ff;top:60%;right:-10%;animation-delay:-3s}
        .orb3{width:200px;height:200px;background:#ffd700;bottom:10%;left:30%;animation-delay:-6s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(30px,-30px)scale(1.1)}66%{transform:translate(-20px,20px)scale(.9)}}
        
        .container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:30px;text-align:center}
        
        /* LOGO ANIMÉ */
        .logo{font-size:6em;animation:logoFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(255,45,120,.5))}
        @keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
        
        /* TITRE NÉON */
        h1{font-size:3em;font-weight:900;background:linear-gradient(135deg,#ff2d78,#00e5ff,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s ease-in-out infinite;background-size:200% 200%}
        @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        
        .subtitle{color:rgba(255,255,255,.6);font-size:1.1em;margin:10px 0 30px;letter-spacing:2px}
        
        /* BOUTONS */
        .btn{display:block;width:280px;padding:18px;margin:12px;border-radius:50px;text-decoration:none;font-weight:700;font-size:1.1em;text-align:center;transition:all .4s;position:relative;overflow:hidden;letter-spacing:1px}
        .btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.1),transparent);transform:rotate(45deg);animation:btnShine 3s infinite}
        @keyframes btnShine{0%{transform:translateX(-100%)rotate(45deg)}100%{transform:translateX(100%)rotate(45deg)}}
        .btn-primary{background:linear-gradient(135deg,#ff2d78,#ff6b9d);color:white;box-shadow:0 10px 30px rgba(255,45,120,.3)}
        .btn-outline{background:transparent;color:white;border:2px solid rgba(255,255,255,.3)}
        .btn:hover{transform:translateY(-3px);box-shadow:0 20px 40px rgba(255,45,120,.4)}
        .btn:active{transform:scale(.95)}
        
        /* STATS */
        .stats{display:flex;gap:30px;margin:20px 0}
        .stat{text-align:center}.stat-val{font-size:2em;font-weight:900;color:#ffd700}.stat-lbl{font-size:.7em;opacity:.5;text-transform:uppercase}
        
        .footer{position:fixed;bottom:20px;color:rgba(255,255,255,.3);font-size:.7em}
    
    
    .nav-item.active{color:#ff2d78}
    
    .nav-item.active 
    

body{padding-bottom:80px;}
</style>
</head>
<body>
    <div class="bg-anim"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
    <div class="container">
        <div class="logo">💎</div>
        <h1>DATING APP</h1>
        <p class="subtitle">L'amour à portée de main</p>
        
        <div class="stats">
            <div class="stat"><div class="stat-val">10K+</div><div class="stat-lbl">Membres</div></div>
            <div class="stat"><div class="stat-val">50K+</div><div class="stat-lbl">Matches</div></div>
            <div class="stat"><div class="stat-val">4.8</div><div class="stat-lbl">Étoiles</div></div>
        </div>
        
        <a href="/register" class="btn btn-primary">🚀 CRÉER UN COMPTE</a>
        <a href="/login" class="btn btn-outline">👤 SE CONNECTER</a>
    </div>
    <div class="footer">© 2026 Kevin Bonkoungou & Jules Ilboudo</div>

<script src="/static/js/unified-badge.js"></script>
</body>
</html>
