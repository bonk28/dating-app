<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | 💕 Dating App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { 
            font-size: 3em; 
            margin-bottom: 10px; 
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .btn {
            display: block;
            padding: 15px;
            margin: 15px 0;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            font-size: 1.1em;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕</h1>
        <h2>Dating App</h2>
        <p class="subtitle">Trouve l'amour autour de toi</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Se connecter</a>
        <a href="{{ url_for('auth.register') }}" class="btn btn-secondary">Créer un compte</a>
    </div>
</body>
</html>
