<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - {{ other_user.username }}</title>
    <style>
        :root{
            --bg:#000000;
            --surface:#0f0f0f;
            --accent:#ff0050;
            --accent2:#ff6b9d;
            --gold:#ffd700;
            --text:#ffffff;
            --sent:linear-gradient(135deg,#ff0050,#c51162);
            --recv:#1a1a1a;
            --border:rgba(255,255,255,0.06);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        /* HEADER STYLE TIKTOK */
        .header{background:linear-gradient(135deg,#ff0050,#00f2ea);padding:10px 15px;display:flex;align-items:center;gap:10px;position:relative;z-index:10}
        .header::after{content:'';position:absolute;bottom:-10px;left:0;right:0;height:10px;background:linear-gradient(transparent,var(--bg))}
        .back{color:white;text-decoration:none;font-size:1.2em;text-shadow:0 0 10px rgba(0,0,0,.5)}
        .avatar{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid white;box-shadow:0 0 20px rgba(255,255,255,.3)}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .info{flex:1}.name{font-weight:700;font-size:1em;text-shadow:0 1px 3px rgba(0,0,0,.5)}.sub{font-size:.7em;opacity:.9}
        .hbtn{color:white;text-decoration:none;font-size:1.2em;padding:8px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);transition:all .2s;border:none;cursor:pointer}
        .hbtn:hover{background:rgba(255,255,255,.3);transform:scale(1.1)}
        .hbtn.call{background:linear-gradient(135deg,#00c853,#64dd17);animation:glow 2s infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 5px rgba(0,200,83,.5)}50%{box-shadow:0 0 20px rgba(0,200,83,.8)}}
        
        /* MESSAGES STYLE WHATSAPP + FB */
        .messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px}
        .messages::-webkit-scrollbar{width:4px}.messages::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
        .msg{max-width:72%;padding:10px 14px;border-radius:20px;font-size:.9em;line-height:1.4;position:relative;animation:msgIn .4s cubic-bezier(0.175,0.885,0.32,1.275)}
        @keyframes msgIn{from{opacity:0;transform:translateY(20px) scale(.8)}}
        .sent{background:var(--sent);align-self:flex-end;border-bottom-right-radius:4px;color:white;box-shadow:0 4px 15px rgba(255,0,80,.3)}
        .recv{background:var(--recv);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
        .time{font-size:.6em;opacity:.5;text-align:right;margin-top:3px;display:flex;align-items:center;justify-content:flex-end;gap:4px}
        .check{font-size:.8em}.check.read{color:#00e5ff}
        .media{max-width:220px;border-radius:16px;cursor:pointer;box-shadow:0 5px 20px rgba(0,0,0,.5)}
        
        /* TIKTOK-STYLE INPUT */
        .input-bar{background:var(--surface);padding:10px 15px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border)}
        .btn{background:none;border:none;color:var(--text);font-size:1.3em;cursor:pointer;padding:8px;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .btn:hover{background:rgba(255,255,255,.1)}.btn:active{transform:scale(.85)}
        .btn.accent{background:var(--accent);color:white;box-shadow:0 0 20px rgba(255,0,80,.4)}
        .btn.game{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;font-weight:bold;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 5px rgba(255,215,0,.5)}50%{box-shadow:0 0 25px rgba(255,215,0,1)}}
        input{flex:1;padding:12px 18px;border:none;border-radius:30px;background:var(--recv);color:var(--text);font-size:.9em;outline:none;border:1px solid var(--border);transition:all .3s}
        input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(255,0,80,.2)}
        input::placeholder{color:rgba(255,255,255,.3)}
        
        /* FLOATING ACTIONS */
        .floating{position:fixed;right:15px;display:flex;flex-direction:column;gap:12px;z-index:50}
        .float-btn{width:48px;height:48px;border-radius:50%;border:none;color:white;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 20px rgba(0,0,0,.5);transition:all .3s}
        .float-btn:active{transform:scale(.85)}
        .float-music{bottom:160px;background:linear-gradient(135deg,#1DB954,#00e676)}
        .float-game{bottom:100px;background:linear-gradient(135deg,#ffd700,#ff8c00)}
        
        /* GAME PANEL */
        .game-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,var(--surface),#000);z-index:200;border-radius:25px 25px 0 0;max-height:65vh;overflow-y:auto;box-shadow:0 -20px 50px rgba(0,0,0,.8);border-top:2px solid var(--accent)}
        .gp-header{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-radius:25px 25px 0 0;font-weight:bold}
        .game-card{display:flex;align-items:center;gap:15px;padding:20px;cursor:pointer;border-bottom:1px solid var(--border);transition:all .2s;background:var(--surface);margin:8px 15px;border-radius:16px}
        .game-card:hover{background:rgba(255,255,255,.05);transform:translateX(5px)}
        .game-icon{font-size:3em}
        .game-arrow{color:var(--accent);font-size:1.5em}
        .btn-action{padding:12px 25px;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin:5px;font-size:.9em;transition:all .2s;text-transform:uppercase;letter-spacing:1px}
        .btn-action:active{transform:scale(.9)}
        .btn-primary{background:var(--accent);color:white}
        .btn-success{background:#00c853;color:white}
        .btn-danger{background:#ff1744;color:white}
        .rps-btn{font-size:4em;padding:20px;border-radius:25px;background:var(--surface);border:2px solid var(--border);cursor:pointer;transition:all .3s}
        .rps-btn:hover{border-color:var(--accent);transform:scale(1.05)}
        .rps-btn.selected{border-color:var(--gold);background:rgba(255,215,0,.1);box-shadow:0 0 30px rgba(255,215,0,.3)}
        .rps-btn:disabled{opacity:.3;cursor:not-allowed}
        .result{text-align:center;padding:20px;font-size:1.3em;animation:pop .6s cubic-bezier(0.175,0.885,0.32,1.275)}
        @keyframes pop{0%{transform:scale(0)rotate(-10deg)}60%{transform:scale(1.1)rotate(3deg)}100%{transform:scale(1)rotate(0)}}
    </style>
</head>
<body>
    <div class="header">
        <a href="/matches" class="back">←</a>
        <a href="/profile/{{ other_user.id }}" style="display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;color:inherit">
            <div class="avatar">{% if other_user.photo %}<img src="/static/uploads/{{ other_user.photo }}">{% else %}👤{% endif %}</div>
            <div class="info"><div class="name">{{ other_user.username }}</div><div class="sub">💎 Dating App</div></div>
        </a>
        <button onclick="callUser('video')" class="hbtn">📹</button>
        <button onclick="callUser('voice')" class="hbtn call">📞</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="floating">
        <button class="float-btn float-music" onclick="showMusic()">🎵</button>
        <button class="float-btn float-game" onclick="openGamePanel()">🎮</button>
    </div>

    <div class="input-bar">
        <button class="btn" onclick="document.getElementById('mediaInput').click()">📷</button>
        <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none" onchange="sendMedia(this.files[0])">
        <button class="btn accent" onclick="openGamePanel()">🎮</button>
        <input id="msgInput" placeholder="Écris un message..." onkeypress="if(event.key==='Enter')sendMsg()">
        <button class="btn" onclick="sendMsg()" style="font-size:1.5em;">➤</button>
    </div>

    <div class="game-panel" id="gamePanel">
        <div class="gp-header"><h3>🎮 JEUX</h3><button onclick="closeGamePanel()" style="background:none;border:none;color:white;font-size:1.5em;cursor:pointer;">✕</button></div>
        <div id="gameMenu" style="padding:10px 0;">
            <div class="game-card" onclick="inviteRPS()"><div class="game-icon">✊</div><div><b>Pierre Feuille Ciseaux</b><br><small style="opacity:.6">Invitation • Manches • Gage</small></div><span class="game-arrow">›</span></div>
            <div class="game-card" onclick="inviteAV()"><div class="game-icon">🎯</div><div><b>Action ou Vérité</b><br><small style="opacity:.6">200 défis • Classique & Adulte</small></div><span class="game-arrow">›</span></div>
        </div>
        <div id="gameContent" style="padding:15px;"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const mid={{match.id}},uid={{current_user.id}},oid={{other_user.id}};
        const socket=io();socket.emit('join_chat',{match_id:mid});
        
        function sendMsg(){const v=document.getElementById('msgInput').value.trim();if(!v)return;fetch('/api/messages/'+mid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:v})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('msgInput').value='';load();}});}
        function sendMedia(f){if(!f)return;const t=f.type.startsWith('video')?'video':'image';const fd=new FormData();fd.append('media',f);fd.append('type',t);fetch('/api/messages/media/'+mid,{method:'POST',body:fd}).then(r=>r.json()).then(d=>{if(d.success)load();});}
        function load(){fetch('/api/messages/'+mid).then(r=>r.json()).then(msgs=>{const c=document.getElementById('messages'),today=new Date().toLocaleDateString('fr-FR');let ld='';c.innerHTML=msgs.map(m=>{const d=new Date(m.created_at).toLocaleDateString('fr-FR'),sep=d!==ld?`<div style="text-align:center;margin:10px 0"><span style="background:rgba(255,255,255,.05);padding:4px 14px;border-radius:20px;font-size:.7em;backdrop-filter:blur(10px)">${d===today?"Aujourd'hui":d}</span></div>`:'';ld=d;const sent=m.sender_id===uid;let cnt=m.content;if(m.message_type==='image')cnt=`<img src="/static/uploads/${m.content}" class="media">`;else if(m.message_type==='video')cnt=`<video src="/static/uploads/${m.content}" class="media" controls></video>`;else if(m.is_deleted)cnt='<i style="opacity:.3">Message supprimé</i>';return sep+`<div class="msg ${sent?'sent':'recv'}">${cnt}${m.is_edited?' <small style="opacity:.4">modifié</small>':''}<div class="time">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}${sent?` <span class="check ${m.is_read?'read':''}">${m.is_read?'✓✓':'✓'}</span>`:''}</div></div>`;}).join('');c.scrollTop=c.scrollHeight;});}
        
        function callUser(type){if(confirm('Appeler {{ other_user.username }} ?')){socket.emit('call_invite',{to_user:oid,type:type,from_user:'{{ current_user.username }}'});window.location.href='/call/'+type+'/'+mid;}}
        socket.on('call_invite',function(data){if(confirm(data.from_user+' vous appelle! Rejoindre?')){window.location.href='/call/'+data.type+'/'+mid;}});
        
        function showMusic(){window.open('/playlist','_blank');}
        function openGamePanel(){document.getElementById('gamePanel').style.display='block';}
        function closeGamePanel(){document.getElementById('gamePanel').style.display='none';document.getElementById('gameContent').innerHTML='';document.getElementById('gameMenu').style.display='block';}
        
        // RPS
        let rpsM=3,rpsMS=0,rpsOS=0,rpsC=0,rpsMC=null,rpsG='';
        function inviteRPS(){document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<h4 style="text-align:center;">✊ Pierre ✋ Feuille ✌️ Ciseaux</h4><div style="margin:15px 0;"><label>Manches:</label><select id="rm" style="padding:10px;border-radius:10px;background:var(--surface);color:white;border:1px solid var(--border);margin-left:10px;"><option>3</option><option>5</option><option>7</option></select></div><div style="margin:15px 0;"><label>Gage:</label><input id="rg" placeholder="Ex: chanter..." style="width:100%;padding:10px;border-radius:10px;background:var(--surface);color:white;border:1px solid var(--border);margin-top:5px;"></div><button class="btn-action btn-primary" onclick="sendRPS()" style="width:100%;">📤 Envoyer</button>`;}
        function sendRPS(){rpsM=parseInt(document.getElementById('rm').value);rpsG=document.getElementById('rg').value.trim()||'Gage';socket.emit('rps_invite',{match_id:mid,to_user:oid,manches:rpsM,gage:rpsG});document.getElementById('gameContent').innerHTML='<p style="text-align:center;padding:30px;">📤 Invitation envoyée...</p>';}
        socket.on('rps_invite_received',(d)=>{document.getElementById('gamePanel').style.display='block';document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<div style="text-align:center;padding:30px;"><p style="font-size:1.2em;">🎮 {{ other_user.username }} vous défie!</p><p>Manches: <b>${d.manches}</b> | Gage: <b>${d.gage}</b></p><div style="margin-top:20px;"><button class="btn-action btn-success" onclick="acceptRPS(${d.manches},'${d.gage.replace(/'/g,"\\'")}')">✅ Accepter</button><button class="btn-action btn-danger" onclick="declineRPS()">❌ Refuser</button></div></div>`;});
        function acceptRPS(m,g){rpsM=m;rpsG=g;rpsMS=0;rpsOS=0;rpsC=0;socket.emit('rps_accept',{match_id:mid,to_user:oid,manches:m,gage:g});startRound();}
        function declineRPS(){socket.emit('rps_decline',{match_id:mid,to_user:oid});closeGamePanel();}
        socket.on('rps_accepted',(d)=>{rpsM=d.manches;rpsG=d.gage;rpsMS=0;rpsOS=0;rpsC=0;document.getElementById('gameContent').innerHTML='<p style="text-align:center;color:#00c853;padding:15px;">✅ Accepté!</p>';setTimeout(startRound,1000);});
        function startRound(){rpsC++;rpsMC=null;if(rpsC>rpsM){endRPS();return;}document.getElementById('gameContent').innerHTML=`<div style="text-align:center;margin:15px 0;"><span>Moi: <b style="color:var(--accent)">${rpsMS}</b></span> | <span>Manche ${rpsC}/${rpsM}</span> | <span>{{ other_user.username }}: <b style="color:var(--accent)">${rpsOS}</b></span></div><div style="display:flex;justify-content:center;gap:15px;margin:20px 0;"><button class="rps-btn" onclick="pickRPS('rock')">✊</button><button class="rps-btn" onclick="pickRPS('paper')">✋</button><button class="rps-btn" onclick="pickRPS('scissors')">✌️</button></div><p id="rpsS" style="text-align:center;opacity:.6;"></p><div id="rpsR"></div>`;}
        function pickRPS(c){if(rpsMC)return;rpsMC=c;document.querySelectorAll('.rps-btn').forEach(b=>{b.disabled=true;b.classList.remove('selected');});event.target.classList.add('selected');document.getElementById('rpsS').textContent='✅ En attente...';socket.emit('rps_round_choice',{match_id:mid,choice:c});}
        socket.on('rps_round_result',(d)=>{const e={rock:'✊',paper:'✋',scissors:'✌️'};let r='';if(d.winner===uid){rpsMS++;r='🎉 GAGNÉ!';}else if(d.winner==='draw'){r='🤝 Égalité';}else{rpsOS++;r='😢 Perdu...';}document.getElementById('rpsR').innerHTML=`<div class="result">${e[rpsMC]} vs ${e[d.opponent_choice]}<br><b style="color:${d.winner===uid?'#00c853':'#ff1744'}">${r}</b><br><button class="btn-action btn-primary" onclick="startRound()">▶ Suite</button></div>`;});
        function endRPS(){const w=rpsMS>rpsOS;document.getElementById('gameContent').innerHTML=`<div class="result"><h3>${w?'👑 VICTOIRE!':'💀 Défaite'}</h3><p style="font-size:1.5em;">${rpsMS} - ${rpsOS}</p><p>${w?'🎉 Tu gagnes! '+rpsG:'😢 Tu dois: '+rpsG}</p><button class="btn-action btn-primary" onclick="document.getElementById(\'gameContent\').innerHTML=\'\';document.getElementById(\'gameMenu\').style.display=\'block\';">🔄 Rejouer</button></div>`;}
        
        const avA=["Fais 10 pompes","Imite célébrité","Danse 30s","Chante","Cri animal","Mime métier","Accent","Grimace","Blague mimée","Playback","Tourne 10x","Robot","Battle regard","Chuchote","Invente chanson","Discours","Mime pub","Talent","Massage","Bébé","Verlan","TikTok","Yeux fermés","Histoire","Gainage"];
        const avV=["Ton rêve?","Ta peur?","Pire date?","Crush?","Talent?","Loto?","Mensonge?","Film?","Souvenir?","Regret?","Métier?","Citation?","Heureux?","Défaut?","Folie?","Livre?","Qualité?","Endroit?","Conseil?","Célébrité?","Compliment?","Phobie?","Énerve?","Guilty?","Pleurs?"];
        function inviteAV(){document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<h4 style="text-align:center;">🎯 Action ou Vérité</h4><div style="display:flex;gap:10px;justify-content:center;margin:20px;"><button class="btn-action btn-success" onclick="sendAVI('classic')">🎯 Classique</button><button class="btn-action btn-danger" onclick="sendAVI('adult')">🔞 Adulte</button></div>`;}
        function sendAVI(v){socket.emit('av_invite',{match_id:mid,to_user:oid,version:v});document.getElementById('gameContent').innerHTML='<p style="text-align:center;padding:30px;">📤 Invitation...</p>';}
        socket.on('av_invite_received',(d)=>{document.getElementById('gamePanel').style.display='block';document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<div style="text-align:center;padding:30px;"><p style="font-size:1.2em;">🎯 {{ other_user.username }} vous invite!</p><button class="btn-action btn-success" onclick="acceptAV('${d.version}')">✅ Accepter</button><button class="btn-action btn-danger" onclick="declineAV()">❌ Refuser</button></div>`;});
        function acceptAV(v){socket.emit('av_accept',{match_id:mid,to_user:oid,version:v});showAV(v);}
        function declineAV(){socket.emit('av_decline',{match_id:mid,to_user:oid});closeGamePanel();}
        socket.on('av_accepted',(d)=>{showAV(d.version);});
        function showAV(v){document.getElementById('gameContent').innerHTML=`<h4 style="text-align:center;">🎯 ${v==='adult'?'🔞 ':''}Action ou Vérité</h4><div style="display:flex;gap:10px;justify-content:center;margin:15px;"><button class="btn-action btn-primary" onclick="pickAV('${v}','action')">⚡ Action</button><button class="btn-action btn-primary" onclick="pickAV('${v}','verite')">💬 Vérité</button></div><div id="avR" style="text-align:center;padding:15px;"></div>`;}
        function pickAV(v,t){const l=t==='action'?avA:avV;const r=l[Math.floor(Math.random()*l.length)];document.getElementById('avR').innerHTML=`<div style="background:rgba(255,255,255,.03);padding:25px;border-radius:20px;animation:pop .5s;border:1px solid ${t==='action'?'#ff9800':'#2196F3'}"><span style="font-size:2em;">${t==='action'?'⚡':'💬'}</span><h3>${t==='action'?'ACTION':'VÉRITÉ'}</h3><p style="font-size:1.3em;">${r}</p></div><button class="btn-action btn-primary" onclick="pickAV('${v}','${t}')">🔄 Relancer</button>`;socket.emit('av_send',{match_id:mid,to_user:oid,type:t,challenge:r});}
        socket.on('av_receive',(d)=>{document.getElementById('avR').innerHTML=`<div style="background:rgba(255,255,255,.03);padding:25px;border-radius:20px;animation:pop .5s;border:1px solid ${d.type==='action'?'#ff9800':'#2196F3'}"><span style="font-size:2em;">📩</span><h3>${d.type==='action'?'ACTION':'VÉRITÉ'} reçu</h3><p style="font-size:1.3em;">${d.challenge}</p></div>`;});
        
        setInterval(load,2000);load();setTimeout(()=>{document.getElementById('messages').scrollTop=99999;},500);
        document.getElementById('msgInput').focus();
    </script>
</body>
</html>
