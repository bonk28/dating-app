<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - {{ other_user.username }}</title>
    <style>
        :root{
            --bg:#0a0a14;
            --surface:#12121f;
            --accent:#ff2d55;
            --accent2:#ff6b81;
            --sent:linear-gradient(135deg,#ff2d55,#ff6b81);
            --recv:#1e1e30;
            --text:#e8e8f0;
            --gold:#ffd700;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
        
        .header{background:var(--surface);padding:10px 15px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.05)}
        .back{color:var(--accent);text-decoration:none;font-size:1.2em}
        .avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:1.1em}
        .avatar img{width:100%;height:100%;object-fit:cover}
        .info{flex:1}.name{font-weight:600;font-size:.95em}.sub{font-size:.7em;opacity:.5}
        .hbtn{color:var(--text);text-decoration:none;font-size:1.1em;padding:8px;border-radius:50%;transition:all .2s}
        .hbtn:hover{background:rgba(255,255,255,.1)}
        
        .messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:6px}
        .msg{max-width:70%;padding:10px 14px;border-radius:18px;font-size:.9em;line-height:1.4;animation:msgIn .3s ease}
        @keyframes msgIn{from{opacity:0;transform:translateY(12px) scale(.95)}}
        .sent{background:var(--sent);align-self:flex-end;border-bottom-right-radius:4px;color:white}
        .recv{background:var(--recv);align-self:flex-start;border-bottom-left-radius:4px}
        .time{font-size:.6em;opacity:.5;text-align:right;margin-top:3px}
        .check{color:#4fc3f7}
        .media{max-width:200px;border-radius:12px;cursor:pointer}
        
        .input-bar{background:var(--surface);padding:8px 12px;display:flex;align-items:center;gap:8px;border-top:1px solid rgba(255,255,255,.05)}
        .btn{background:none;border:none;color:var(--text);font-size:1.2em;cursor:pointer;padding:8px;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .btn:hover{background:rgba(255,255,255,.08)}
        .btn.accent{background:var(--accent);color:white}
        .btn.accent:hover{background:var(--accent2)}
        input{flex:1;padding:12px 16px;border:none;border-radius:25px;background:rgba(255,255,255,.05);color:var(--text);font-size:.9em;outline:none}
        input::placeholder{color:rgba(255,255,255,.3)}
        
        .game-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);z-index:200;border-radius:20px 20px 0 0;max-height:65vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.5)}
        .gp-header{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-radius:20px 20px 0 0}
        .game-card{display:flex;align-items:center;gap:15px;padding:18px 20px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.03);transition:all .2s}
        .game-card:hover{background:rgba(255,255,255,.03)}
        .game-card:active{background:rgba(255,255,255,.06)}
        .game-icon{font-size:2.5em}
        .game-arrow{color:rgba(255,255,255,.3);font-size:1.5em}
        .btn-action{padding:12px 25px;border:none;border-radius:25px;font-weight:bold;cursor:pointer;margin:5px;font-size:.9em;transition:all .2s}
        .btn-action:active{transform:scale(.95)}
        .btn-primary{background:var(--accent);color:white}
        .btn-success{background:#4CAF50;color:white}
        .btn-danger{background:#f44336;color:white}
        .invite-box{text-align:center;padding:30px;font-size:1.1em}
        .rps-btn{font-size:3.5em;padding:20px;border-radius:20px;background:rgba(255,255,255,.03);border:2px solid transparent;cursor:pointer;transition:all .2s}
        .rps-btn:hover{background:rgba(255,255,255,.08)}
        .rps-btn.selected{border-color:var(--accent);background:rgba(255,45,85,.15)}
        .rps-btn:disabled{opacity:.3;cursor:not-allowed}
        .result{text-align:center;padding:20px;font-size:1.2em;animation:pop .5s}
        @keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
    </style>
</head>
<body>
    <div class="header">
        <a href="/matches" class="back">←</a>
        <a href="/profile/{{ other_user.id }}" style="display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;color:inherit">
            <div class="avatar">{% if other_user.photo %}<img src="/static/uploads/{{ other_user.photo }}">{% else %}👤{% endif %}</div>
            <div class="info"><div class="name">{{ other_user.username }}</div><div class="sub">Dating App</div></div>
        </a>
        <button onclick="callUser('video')" class="hbtn">📹</button>
        <button onclick="callUser('voice')" class="hbtn">📞</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-bar">
        <button class="btn accent" onclick="openGamePanel()">🎮</button>
        <label class="btn">📷<input type="file" accept="image/*,video/*" style="display:none" onchange="sendMedia(this.files[0])"></label>
        <input id="msgInput" placeholder="Écris un message..." onkeypress="if(event.key==='Enter')sendMsg()">
        <button class="btn" onclick="sendMsg()" style="font-size:1.4em;">➤</button>
    </div>

    <div class="game-panel" id="gamePanel">
        <div class="gp-header"><h3>🎮 Jeux</h3><button onclick="closeGamePanel()" style="background:none;border:none;color:white;font-size:1.5em;cursor:pointer;">✕</button></div>
        <div id="gameMenu">
            <div class="game-card" onclick="inviteRPS()"><div class="game-icon">✊</div><div><b>Pierre Feuille Ciseaux</b><br><small style="opacity:.5">Invitation + manches + gage</small></div><span class="game-arrow">›</span></div>
            <div class="game-card" onclick="inviteAV()"><div class="game-icon">🎯</div><div><b>Action ou Vérité</b><br><small style="opacity:.5">Classique & Adulte</small></div><span class="game-arrow">›</span></div>
        </div>
        <div id="gameContent" style="padding:15px;"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const mid={{match.id}},uid={{current_user.id}},oid={{other_user.id}};
        const socket=io();socket.emit('join_chat',{match_id:mid});
        
        function sendMsg(){const v=document.getElementById('msgInput').value.trim();if(!v)return;fetch('/api/messages/'+mid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:v})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('msgInput').value='';load();}});}
        function sendMedia(f){if(!f)return;const t=f.type.startsWith('video')?'video':'image';const fd=new FormData();fd.append('media',f);fd.append('type',t);fetch('/api/messages/media/'+mid,{method:'POST',body:fd}).then(r=>r.json()).then(d=>{if(d.success)load();});}
        function load(){fetch('/api/messages/'+mid).then(r=>r.json()).then(msgs=>{const c=document.getElementById('messages'),today=new Date().toLocaleDateString('fr-FR');let ld='';c.innerHTML=msgs.map(m=>{const d=new Date(m.created_at).toLocaleDateString('fr-FR'),sep=d!==ld?`<div style="text-align:center;margin:8px 0"><span style="background:rgba(255,255,255,.06);padding:3px 12px;border-radius:10px;font-size:.7em;opacity:.5">${d===today?"Aujourd'hui":d}</span></div>`:'';ld=d;const sent=m.sender_id===uid;let cnt=m.content;if(m.message_type==='image')cnt=`<img src="/static/uploads/${m.content}" class="media">`;else if(m.message_type==='video')cnt=`<video src="/static/uploads/${m.content}" class="media" controls></video>`;else if(m.is_deleted)cnt='<i style="opacity:.3">Message supprimé</i>';return sep+`<div class="msg ${sent?'sent':'recv'}">${cnt}${m.is_edited?' <small style="opacity:.4">modifié</small>':''}<div class="time">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}${sent?` <span class="check">${m.is_read?'✓✓':'✓'}</span>`:''}</div></div>`;}).join('');c.scrollTop=c.scrollHeight;});}
        
        function callUser(type){if(confirm('Appeler {{ other_user.username }} en '+(type==='video'?'vidéo':'vocal')+' ?')){socket.emit('call_invite',{to_user:oid,type:type,from_user:'{{ current_user.username }}'});window.location.href='/call/'+type+'/'+mid;}}
        socket.on('call_invite',function(data){if(confirm(data.from_user+' vous appelle en '+(data.type==='video'?'vidéo 📹':'vocal 📞')+' ! Rejoindre ?')){window.location.href='/call/'+data.type+'/'+mid;}});
        
        function openGamePanel(){document.getElementById('gamePanel').style.display='block';}
        function closeGamePanel(){document.getElementById('gamePanel').style.display='none';document.getElementById('gameContent').innerHTML='';document.getElementById('gameMenu').style.display='block';}
        
        // RPS
        let rpsManches=3,rpsMyScore=0,rpsOppScore=0,rpsCurrent=0,rpsMyChoice=null,rpsGage='';
        
        function inviteRPS(){document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<h4 style="text-align:center;">✊ Pierre ✋ Feuille ✌️ Ciseaux</h4><div style="margin:15px 0;"><label>Manches :</label><select id="rpsManches" style="padding:8px;border-radius:8px;background:rgba(255,255,255,.05);color:white;border:1px solid rgba(255,255,255,.2);margin-left:10px;"><option value="3">3</option><option value="5">5</option><option value="7">7</option></select></div><div style="margin:15px 0;"><label>Gage perdant :</label><input id="rpsGage" placeholder="Ex: chanter, danser..." style="width:100%;padding:10px;border-radius:8px;background:rgba(255,255,255,.05);color:white;border:1px solid rgba(255,255,255,.2);margin-top:5px;"></div><button class="btn-action btn-primary" onclick="sendRPSInvite()" style="display:block;width:100%;">📤 Envoyer</button>`;}
        function sendRPSInvite(){rpsManches=parseInt(document.getElementById('rpsManches').value);rpsGage=document.getElementById('rpsGage').value.trim()||'Gage surprise';socket.emit('rps_invite',{match_id:mid,to_user:oid,manches:rpsManches,gage:rpsGage});document.getElementById('gameContent').innerHTML='<div class="invite-box">📤 Invitation envoyée...</div>';}
        socket.on('rps_invite_received',(d)=>{document.getElementById('gamePanel').style.display='block';document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<div class="invite-box"><p style="font-size:1.2em;">🎮 Défi de {{ other_user.username }}!</p><p>Manches: <b>${d.manches}</b> | Gage: <b>${d.gage}</b></p><div style="margin-top:20px;"><button class="btn-action btn-success" onclick="acceptRPS(${d.manches},'${d.gage.replace(/'/g,"\\'")}')">✅ Accepter</button><button class="btn-action btn-danger" onclick="declineRPS()">❌ Refuser</button></div></div>`;});
        function acceptRPS(m,g){rpsManches=m;rpsGage=g;rpsMyScore=0;rpsOppScore=0;rpsCurrent=0;socket.emit('rps_accept',{match_id:mid,to_user:oid,manches:m,gage:g});startRPSRound();}
        function declineRPS(){socket.emit('rps_decline',{match_id:mid,to_user:oid});closeGamePanel();}
        socket.on('rps_accepted',(d)=>{rpsManches=d.manches;rpsGage=d.gage;rpsMyScore=0;rpsOppScore=0;rpsCurrent=0;document.getElementById('gameContent').innerHTML='<p style="text-align:center;color:#4CAF50;">✅ Accepté!</p>';setTimeout(startRPSRound,1000);});
        function startRPSRound(){rpsCurrent++;rpsMyChoice=null;if(rpsCurrent>rpsManches){endRPS();return;}document.getElementById('gameContent').innerHTML=`<div style="text-align:center;margin-bottom:15px;"><span>Moi: <b>${rpsMyScore}</b></span> | <span>Manche ${rpsCurrent}/${rpsManches}</span> | <span>{{ other_user.username }}: <b>${rpsOppScore}</b></span></div><div style="display:flex;justify-content:center;gap:15px;margin:15px 0;"><button class="rps-btn" onclick="chooseRPS('rock')">✊</button><button class="rps-btn" onclick="chooseRPS('paper')">✋</button><button class="rps-btn" onclick="chooseRPS('scissors')">✌️</button></div><p id="rpsStatus" style="text-align:center;opacity:.5;"></p><div id="rpsResult"></div>`;}
        function chooseRPS(c){if(rpsMyChoice)return;rpsMyChoice=c;document.querySelectorAll('.rps-btn').forEach(b=>{b.disabled=true;b.classList.remove('selected');});event.target.classList.add('selected');document.getElementById('rpsStatus').textContent='✅ En attente...';socket.emit('rps_round_choice',{match_id:mid,choice:c});}
        socket.on('rps_round_result',(d)=>{rpsOppChoice=d.opponent_choice;const e={rock:'✊',paper:'✋',scissors:'✌️'};let r='';if(d.winner===uid){rpsMyScore++;r='🎉 Gagné!';}else if(d.winner==='draw'){r='🤝 Égalité';}else{rpsOppScore++;r='😢 Perdu...';}document.getElementById('rpsResult').innerHTML=`<div class="result">Toi:${e[rpsMyChoice]} vs Lui:${e[rpsOppChoice]}<br><b>${r}</b><br><button class="btn-action btn-primary" onclick="startRPSRound()">▶ Suite</button></div>`;});
        function endRPS(){const w=rpsMyScore>rpsOppScore;document.getElementById('gameContent').innerHTML=`<div class="result"><h3>🏆 ${w?'VICTOIRE!':'Défaite...'}</h3><p>${rpsMyScore} - ${rpsOppScore}</p><p>${w?'🎉 '+rpsGage:'😢 '+rpsGage}</p><button class="btn-action btn-primary" onclick="document.getElementById(\'gameContent\').innerHTML=\'\';document.getElementById(\'gameMenu\').style.display=\'block\';">🔄 Rejouer</button></div>`;}
        
        // AV
        const avActions=["Fais 10 pompes","Imite célébrité","Danse 30s","Chante","Cri animal","Mime métier","Accent étranger","Grimace selfie","Blague mimée","Playback","Tourne 10x","Marche robot","Battle regard","Chuchote secret","Invente chanson","Discours Oscar","Mime pub","Talent caché","Massage épaules","Bébé rire","Verlan","Danse TikTok","Yeux fermés dessin","Histoire 3 objets","Gainage 30s","Animal préféré","Compliment corps","Yaourt chanson","Présentateur météo","Danse sans musique"];
        const avVerites=["Ton rêve?","Ta peur?","Pire date?","Premier crush?","Talent caché?","Au loto?","Plus gros mensonge?","Film préféré?","Plus beau souvenir?","Regret?","Métier enfant?","Citation préférée?","Ce qui te rend heureux?","Pire défaut?","Chose folle faite?","Livre préféré?","Qualité admirée?","Endroit préféré?","Meilleur conseil?","Dîner célébrité?","Plus beau compliment?","Phobie?","Ce qui t'énerve?","Guilty pleasure?","Dernière fois pleuré?","Pire conseil?","Changerais chez toi?","Plus gros risque?","Plus fier?","On retient quoi de toi?"];
        function inviteAV(){document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<h4 style="text-align:center;">🎯 Action ou Vérité</h4><div style="display:flex;gap:10px;justify-content:center;margin:20px 0;"><button class="btn-action btn-success" onclick="sendAVInvite('classic')">🎯 Classique</button><button class="btn-action btn-danger" onclick="sendAVInvite('adult')">🔞 Adulte</button></div>`;}
        function sendAVInvite(v){socket.emit('av_invite',{match_id:mid,to_user:oid,version:v});document.getElementById('gameContent').innerHTML='<div class="invite-box">📤 Invitation envoyée...</div>';}
        socket.on('av_invite_received',(d)=>{document.getElementById('gamePanel').style.display='block';document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<div class="invite-box"><p style="font-size:1.2em;">🎯 {{ other_user.username }} vous invite!</p><div style="margin-top:20px;"><button class="btn-action btn-success" onclick="acceptAV('${d.version}')">✅ Accepter</button><button class="btn-action btn-danger" onclick="declineAV()">❌ Refuser</button></div></div>`;});
        function acceptAV(v){socket.emit('av_accept',{match_id:mid,to_user:oid,version:v});showAVPanel(v);}
        function declineAV(){socket.emit('av_decline',{match_id:mid,to_user:oid});closeGamePanel();}
        socket.on('av_accepted',(d)=>{showAVPanel(d.version);});
        function showAVPanel(v){document.getElementById('gameContent').innerHTML=`<h4 style="text-align:center;">🎯 ${v==='adult'?'🔞 ':''}Action ou Vérité</h4><div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0;"><button class="btn-action btn-primary" onclick="pickAV('${v}','action')">⚡ Action</button><button class="btn-action btn-primary" onclick="pickAV('${v}','verite')">💬 Vérité</button></div><div id="avResult" style="text-align:center;padding:15px;"></div>`;}
        function pickAV(v,t){const l=t==='action'?avActions:avVerites;const r=l[Math.floor(Math.random()*l.length)];const bg=t==='action'?'rgba(255,152,0,.15)':'rgba(33,150,243,.15)';const border=t==='action'?'#ff9800':'#2196F3';document.getElementById('avResult').innerHTML=`<div style="background:${bg};padding:25px;border-radius:15px;border:1px solid ${border};animation:pop .5s;"><span style="font-size:2em;">${t==='action'?'⚡':'💬'}</span><h3>${t==='action'?'ACTION':'VÉRITÉ'}</h3><p style="font-size:1.2em;margin:10px 0;">${r}</p></div><button class="btn-action btn-primary" onclick="pickAV('${v}','${t}')" style="margin-top:10px;">🔄 Relancer</button>`;socket.emit('av_send',{match_id:mid,to_user:oid,type:t,challenge:r});}
        socket.on('av_receive',(d)=>{document.getElementById('avResult').innerHTML=`<div style="background:rgba(255,255,255,.05);padding:25px;border-radius:15px;animation:pop .5s;"><span style="font-size:2em;">📩</span><h3>${d.type==='action'?'ACTION':'VÉRITÉ'} reçu</h3><p style="font-size:1.2em;margin:10px 0;">${d.challenge}</p></div>`;});
        
        setInterval(load,2000);load();setTimeout(()=>{document.getElementById('messages').scrollTop=99999;},500);
    </script>
</body>
</html>
