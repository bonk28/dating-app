<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💎 {{ other_user.username }}</title>
    <style>
        :root{
            --bg:#050510;
            --surface:#0d0d20;
            --accent:#ff2d78;
            --accent2:#ff6b9d;
            --cyan:#00e5ff;
            --gold:#ffd700;
            --lime:#aeea00;
            --text:#f0f0ff;
            --sent:linear-gradient(135deg,#ff2d78 0%,#ff6b9d 50%,#ff2d78 100%);
            --recv:linear-gradient(135deg,#1a1a30,#0d0d20);
            --border:rgba(255,255,255,0.04);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
        
        /* PARTICULES EN FOND */
        .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;animation:float linear infinite;opacity:0}
        @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) scale(1);opacity:0}}
        
        /* HEADER NÉON */
        .header{background:linear-gradient(180deg,rgba(13,13,32,.95),rgba(5,5,16,.95));padding:12px 15px;display:flex;align-items:center;gap:12px;position:relative;z-index:10;border-bottom:1px solid rgba(255,45,120,.2);backdrop-filter:blur(20px)}
        .header::after{content:'';position:absolute;bottom:-2px;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--cyan),var(--accent),transparent)}
        .back{color:var(--text);text-decoration:none;font-size:1.1em;opacity:.7}
        .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--cyan));padding:2px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(255,45,120,.3)}
        .avatar-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.2em}
        .avatar-inner img{width:100%;height:100%;object-fit:cover}
        .info{flex:1}.name{font-weight:700;font-size:1em;background:linear-gradient(135deg,var(--text),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sub{font-size:.65em;opacity:.5;letter-spacing:1px;text-transform:uppercase}
        .hbtn{color:var(--text);text-decoration:none;font-size:1.1em;padding:10px;border-radius:50%;background:rgba(255,255,255,.03);border:1px solid var(--border);transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
        .hbtn::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:0;transition:opacity .3s}
        .hbtn:hover::before{opacity:.1}.hbtn:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 5px 20px rgba(255,45,120,.2)}
        .hbtn.call-btn{background:linear-gradient(135deg,#00c853,#00e676);border:none;animation:glowPulse 2s infinite}
        @keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(0,200,83,.4)}50%{box-shadow:0 0 30px rgba(0,200,83,.8),0 0 60px rgba(0,200,83,.3)}}
        
        /* MESSAGES */
        .messages{flex:1;overflow-y:auto;padding:20px 15px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
        .messages::-webkit-scrollbar{width:3px}.messages::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
        
        .msg-group{display:flex;flex-direction:column;gap:2px}
        .msg{max-width:70%;padding:12px 16px;font-size:.9em;line-height:1.5;position:relative;animation:msgPop .5s cubic-bezier(0.175,0.885,0.32,1.275)}
        @keyframes msgPop{0%{opacity:0;transform:scale(.8)translateY(30px)}}
        .sent-group{align-items:flex-end}.recv-group{align-items:flex-start}
        .sent .msg{background:var(--sent);color:white;border-radius:20px 20px 4px 20px;box-shadow:0 5px 25px rgba(255,45,120,.2)}
        .recv .msg{background:var(--recv);border-radius:20px 20px 20px 4px;border:1px solid var(--border);box-shadow:0 5px 25px rgba(0,0,0,.3)}
        .msg:first-child{border-top-left-radius:20px;border-top-right-radius:20px}
        .msg:last-child{border-bottom-left-radius:20px;border-bottom-right-radius:20px}
        .msg-time{font-size:.6em;opacity:.4;margin-top:4px;text-align:right}
        .msg-check{color:var(--cyan)}.msg-check.read{color:var(--cyan)}
        .media{max-width:220px;border-radius:16px;cursor:pointer;box-shadow:0 8px 30px rgba(0,0,0,.5)}
        
        /* INPUT BAR */
        .input-bar{background:var(--surface);padding:12px 15px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border);position:relative;z-index:10}
        .btn{background:none;border:none;color:var(--text);font-size:1.2em;cursor:pointer;padding:10px;border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;transition:all .3s;position:relative}
        .btn:hover{background:rgba(255,255,255,.05)}.btn:active{transform:scale(.8)}
        .btn.accent{background:var(--accent);color:white;box-shadow:0 0 25px rgba(255,45,120,.4)}
        .btn.game-btn{background:linear-gradient(135deg,var(--gold),#ff8c00);color:#000;font-weight:bold;animation:pulseGold 2s infinite}
        @keyframes pulseGold{0%,100%{box-shadow:0 0 10px rgba(255,215,0,.4)}50%{box-shadow:0 0 30px rgba(255,215,0,.8)}}
        input{flex:1;padding:14px 20px;border:none;border-radius:30px;background:var(--bg);color:var(--text);font-size:.9em;outline:none;border:1px solid var(--border);transition:all .3s}
        input:focus{border-color:var(--accent);box-shadow:0 0 30px rgba(255,45,120,.1)}
        input::placeholder{color:rgba(255,255,255,.2)}
        
        /* BOUTONS FLOTTANTS */
        .float-actions{position:fixed;right:15px;display:flex;flex-direction:column;gap:15px;z-index:50}
        .fab{width:52px;height:52px;border-radius:50%;border:none;color:white;font-size:1.3em;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:all .3s;position:relative;overflow:hidden}
        .fab::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .3s}
        .fab:hover::after{opacity:1}.fab:active{transform:scale(.85)}
        .fab-music{bottom:170px;background:linear-gradient(135deg,#1DB954,#00e676)}
        .fab-game{bottom:110px;background:linear-gradient(135deg,#ffd700,#ff8c00)}
        .fab-notif{bottom:50px;background:linear-gradient(135deg,#ff2d78,#ff6b9d)}
        .fab-badge{position:absolute;top:-5px;right:-5px;background:white;color:#ff2d78;border-radius:50%;width:22px;height:22px;font-size:.6em;display:flex;align-items:center;justify-content:center;font-weight:bold}
        
        /* GAME PANEL */
        .game-panel{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,var(--surface),#000);z-index:200;border-radius:30px 30px 0 0;max-height:70vh;overflow-y:auto;box-shadow:0 -30px 60px rgba(0,0,0,.9);border-top:2px solid var(--accent)}
        .gp-header{background:linear-gradient(135deg,var(--accent),var(--cyan));color:white;padding:18px 25px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;border-radius:30px 30px 0 0;font-weight:800;font-size:1.1em;letter-spacing:1px}
        .gp-close{background:rgba(255,255,255,.2);border:none;color:white;width:35px;height:35px;border-radius:50%;font-size:1.2em;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .game-card{display:flex;align-items:center;gap:18px;padding:22px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:all .3s;margin:10px 15px;border-radius:20px;background:var(--surface)}
        .game-card:hover{background:rgba(255,255,255,.03);border-color:var(--accent);transform:translateX(8px)}
        .game-card .icon{font-size:3.5em;filter:drop-shadow(0 0 10px rgba(255,45,120,.3))}
        .game-card .arrow{color:var(--accent);font-size:2em;font-weight:bold}
        
        /* BOUTONS ACTION */
        .btn-action{padding:14px 30px;border:none;border-radius:30px;font-weight:700;cursor:pointer;font-size:.9em;transition:all .3s;text-transform:uppercase;letter-spacing:2px;position:relative;overflow:hidden}
        .btn-action::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .3s}
        .btn-action:hover::after{opacity:1}.btn-action:active{transform:scale(.9)}
        .btn-primary{background:var(--accent);color:white}
        .btn-success{background:linear-gradient(135deg,#00c853,#00e676);color:white}
        .btn-danger{background:linear-gradient(135deg,#ff1744,#ff5252);color:white}
        .btn-outline{background:transparent;color:var(--accent);border:2px solid var(--accent)}
        
        /* RPS */
        .rps-btn{font-size:4.5em;padding:25px;border-radius:25px;background:var(--surface);border:2px solid var(--border);cursor:pointer;transition:all .4s}
        .rps-btn:hover{border-color:var(--gold);transform:scale(1.08)rotate(-5deg);box-shadow:0 0 40px rgba(255,215,0,.3)}
        .rps-btn.selected{border-color:var(--gold)!important;background:rgba(255,215,0,.1)!important;box-shadow:0 0 50px rgba(255,215,0,.4)!important;animation:selectedPulse .5s infinite}
        @keyframes selectedPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .rps-btn:disabled{opacity:.2;cursor:not-allowed;filter:grayscale(1)}
        
        /* RÉSULTAT */
        .result-box{text-align:center;padding:30px;animation:resultIn .8s cubic-bezier(0.175,0.885,0.32,1.275)}
        @keyframes resultIn{0%{opacity:0;transform:scale(0)rotate(-20deg)}60%{transform:scale(1.1)rotate(5deg)}100%{transform:scale(1)rotate(0)}}
        .trophy{font-size:5em;animation:bounce 1s infinite}@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
        
        /* MODAL MUSIQUE */
        .music-modal{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(180deg,#1a1a30,#000);z-index:300;border-radius:25px 25px 0 0;max-height:60vh;overflow-y:auto;box-shadow:0 -20px 50px rgba(0,0,0,.8);padding:20px}
        .music-modal.show{display:block}
    
    
    .nav-item.active{color:#ff2d78}
    
    .nav-item.active 
    

body{padding-bottom:80px;}
</style>
</head>
<body>
    <!-- PARTICULES -->
    <div class="particles" id="particles"></div>

    <!-- HEADER -->
    <div class="header">
        <a href="/matches" class="back">←</a>
        <a href="/profile/{{ other_user.id }}" style="display:flex;align-items:center;gap:12px;flex:1;text-decoration:none;color:inherit">
            <div class="avatar"><div class="avatar-inner">{% if other_user.photo %}<img src="/static/uploads/{{ other_user.photo }}">{% else %}👤{% endif %}</div></div>
            <div class="info"><div class="name">{{ other_user.username }}</div><div class="sub">💎 Premium Match <span class="online-dot"></span></div></div>
        </a>
        <button onclick="callUser('video')" class="hbtn">📹</button>
        <button onclick="callUser('voice')" class="hbtn call-btn">📞</button>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages"></div>

    <!-- FLOATING BUTTONS -->
    <div class="float-actions">
        <button class="fab fab-music" onclick="showMusic()">🎵</button>
        <button class="fab fab-game" onclick="openGamePanel()">🎮</button>
        <button class="fab fab-notif" onclick="showNotifs()">🔔<span class="fab-badge" id="notifCount">0</span></button>
    </div>

    <!-- INPUT -->
    <div class="input-bar">
        <button class="btn" onclick="document.getElementById('mediaFile').click()">🖼️</button>
        <input type="file" id="mediaFile" accept="image/*,video/*" style="display:none" onchange="sendMedia(this.files[0])">
        <button class="btn accent" onclick="openGamePanel()">🎮</button>
        <input id="msgInput" placeholder="Message..." onkeypress="if(event.key==='Enter')sendMsg()">
        <button class="btn" onclick="sendMsg()" style="font-size:1.5em;color:var(--accent)">▶</button>
    </div>

    <!-- GAME PANEL -->
    <div class="game-panel" id="gamePanel">
        <div class="gp-header"><span>🎮 JEUX</span><button class="gp-close" onclick="closeGamePanel()">✕</button></div>
        <div id="gameMenu" style="padding:10px 0;">
            <div class="game-card" onclick="inviteRPS()"><span class="icon">✊</span><div style="flex:1"><b>Pierre Feuille Ciseaux</b><br><small style="opacity:.5">Manches • Gage • Duel</small></div><span class="arrow">›</span></div>
            <div class="game-card" onclick="inviteAV()"><span class="icon">🎯</span><div style="flex:1"><b>Action ou Vérité</b><br><small style="opacity:.5">200 défis • Classique & Adulte</small></div><span class="arrow">›</span></div>
            <div class="game-card" onclick="startMorpion()"><span class="icon">🎲</span><div style="flex:1"><b>Morpion</b><br><small style="opacity:.5">Tic-Tac-Toe en direct</small></div><span class="arrow">›</span></div>
        </div>
        <div id="gameContent" style="padding:20px;"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // PARTICULES
        const particles=document.getElementById('particles');
        for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(Math.random()*10+5)+'s';p.style.animationDelay=Math.random()*5+'s';p.style.width=p.style.height=(Math.random()*4+1)+'px';particles.appendChild(p);}
        
        const mid={{match.id}},uid={{current_user.id}},oid={{other_user.id}};
        const socket=io();socket.emit('join_chat',{match_id:mid});
        
        function sendMsg(){const v=document.getElementById('msgInput').value.trim();if(!v)return;fetch('/api/messages/'+mid,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:v})}).then(r=>r.json()).then(d=>{if(d.success){document.getElementById('msgInput').value='';load();}});}
        function sendMedia(f){if(!f)return;const t=f.type.startsWith('video')?'video':'image';const fd=new FormData();fd.append('media',f);fd.append('type',t);fetch('/api/messages/media/'+mid,{method:'POST',body:fd}).then(r=>r.json()).then(d=>{if(d.success)load();});}
        function load(){fetch('/api/messages/'+mid).then(r=>r.json()).then(msgs=>{const c=document.getElementById('messages'),today=new Date().toLocaleDateString('fr-FR');let ld='';c.innerHTML=msgs.map(m=>{const d=new Date(m.created_at).toLocaleDateString('fr-FR'),sep=d!==ld?`<div style="text-align:center;margin:15px 0"><span style="background:rgba(255,255,255,.03);padding:5px 18px;border-radius:20px;font-size:.7em;border:1px solid var(--border)">${d===today?"Aujourd'hui":d}</span></div>`:'';ld=d;const sent=m.sender_id===uid;let cnt=m.content;if(m.message_type==='image')cnt=`<img src="/static/uploads/${m.content}" class="media">`;else if(m.message_type==='video')cnt=`<video src="/static/uploads/${m.content}" class="media" controls></video>`;else if(m.is_deleted)cnt='<i style="opacity:.2">Message supprimé</i>';return sep+`<div class="msg-group ${sent?'sent-group':'recv-group'}"><div class="msg">${cnt}${m.is_edited?' <small style="opacity:.3">modifié</small>':''}<div class="msg-time">${new Date(m.created_at).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}${sent?` <span class="msg-check ${m.is_read?'read':''}">${m.is_read?'✓✓':'✓'}</span>`:''}</div></div></div>`;}).join('');c.scrollTop=c.scrollHeight;});}
        
        function callUser(type){if(confirm('📞 Appeler {{ other_user.username }} ?')){socket.emit('invite_call',{to_user:oid,call_type:type,from_user:'{{ current_user.username }}'});alert('📞 Appel lancé! Vous serez redirigé...');}}
        socket.on('call_invite',function(data){if(confirm('📞 '+data.from_user+' vous appelle!')){window.location.href='/call/'+data.type+'/'+mid;}});
        
        function showMusic(){window.open('/playlist','_blank');}
        function showNotifs(){alert('🔔 Notifications bientôt disponibles');}
        function openGamePanel(){document.getElementById('gamePanel').style.display='block';}
        function closeGamePanel(){document.getElementById('gamePanel').style.display='none';document.getElementById('gameContent').innerHTML='';document.getElementById('gameMenu').style.display='block';}
        
        // RPS
        let rM=3,rMS=0,rOS=0,rC=0,rMC=null,rG='';
        function inviteRPS(){document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<h3 style="text-align:center;">✊ PIERRE ✋ FEUILLE ✌️ CISEAUX</h3><div style="margin:20px 0;"><label>Manches:</label><select id="rm" style="padding:12px;border-radius:12px;background:var(--surface);color:white;border:1px solid var(--border);margin-left:15px;font-size:1em;"><option>3</option><option>5</option><option>7</option></select></div><div style="margin:20px 0;"><label>Gage perdant:</label><input id="rg" placeholder="Ex: chanter, danser..." style="width:100%;padding:14px;border-radius:12px;background:var(--surface);color:white;border:1px solid var(--border);margin-top:8px;font-size:.9em;"></div><button class="btn-action btn-primary" onclick="sendRPS()" style="width:100%;font-size:1em;">📤 ENVOYER L'INVITATION</button>`;}
        function sendRPS(){rM=parseInt(document.getElementById('rm').value);rG=document.getElementById('rg').value.trim()||'Gage surprise';socket.emit('rps_invite',{match_id:mid,to_user:oid,manches:rM,gage:rG});document.getElementById('gameContent').innerHTML='<p style="text-align:center;padding:40px;font-size:1.2em;">📤 Invitation envoyée...</p>';}
        socket.on('rps_invite_received',(d)=>{document.getElementById('gamePanel').style.display='block';document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<div style="text-align:center;padding:40px;"><span style="font-size:4em;">⚔️</span><p style="font-size:1.3em;">{{ other_user.username }} vous DÉFIE!</p><p>Manches: <b>${d.manches}</b> | Gage: <b>${d.gage}</b></p><div style="margin-top:25px;display:flex;gap:15px;justify-content:center;"><button class="btn-action btn-success" onclick="acceptRPS(${d.manches},'${d.gage.replace(/'/g,"\\'")}')">⚔️ ACCEPTER</button><button class="btn-action btn-danger" onclick="declineRPS()">🏳️ REFUSER</button></div></div>`;});
        function acceptRPS(m,g){rM=m;rG=g;rMS=0;rOS=0;rC=0;socket.emit('rps_accept',{match_id:mid,to_user:oid,manches:m,gage:g});startRound();}
        function declineRPS(){socket.emit('rps_decline',{match_id:mid,to_user:oid});closeGamePanel();}
        socket.on('rps_accepted',(d)=>{rM=d.manches;rG=d.gage;rMS=0;rOS=0;rC=0;document.getElementById('gameContent').innerHTML='<p style="text-align:center;color:#00c853;padding:20px;font-size:1.2em;">✅ COMBAT ACCEPTÉ!</p>';setTimeout(startRound,1000);});
        function startRound(){rC++;rMC=null;if(rC>rM){endRPS();return;}document.getElementById('gameContent').innerHTML=`<div style="text-align:center;margin-bottom:20px;"><span style="font-size:1.2em;">Moi: <b style="color:var(--accent)">${rMS}</b></span> <span style="margin:0 20px;">Round ${rC}/${rM}</span> <span style="font-size:1.2em;">{{ other_user.username }}: <b style="color:var(--accent)">${rOS}</b></span></div><div style="display:flex;justify-content:center;gap:20px;margin:25px 0;"><button class="rps-btn" onclick="pickRPS('rock')">✊</button><button class="rps-btn" onclick="pickRPS('paper')">✋</button><button class="rps-btn" onclick="pickRPS('scissors')">✌️</button></div><p id="rpsS" style="text-align:center;opacity:.6;margin:10px 0;"></p><div id="rpsR"></div>`;}
        function pickRPS(c){if(rMC)return;rMC=c;document.querySelectorAll('.rps-btn').forEach(b=>{b.disabled=true;b.classList.remove('selected');});event.target.classList.add('selected');document.getElementById('rpsS').textContent='✅ Choix verrouillé...';socket.emit('rps_round_choice',{match_id:mid,choice:c});}
        socket.on('rps_round_result',(d)=>{const e={rock:'✊',paper:'✋',scissors:'✌️'};let r='';if(d.winner===uid){rMS++;r='⚔️ VICTOIRE!';}else if(d.winner==='draw'){r='🤝 Égalité';}else{rOS++;r='💀 Défaite...';}document.getElementById('rpsR').innerHTML=`<div class="result-box"><div style="font-size:3em;">${e[rMC]} VS ${e[d.opponent_choice]}</div><p style="font-size:1.3em;color:${d.winner===uid?'#00c853':'#ff1744'}">${r}</p><button class="btn-action btn-primary" onclick="startRound()">▶ ROUND SUIVANT</button></div>`;});
        function endRPS(){const w=rMS>rOS;document.getElementById('gameContent').innerHTML=`<div class="result-box">${w?'<div class="trophy">👑</div><h2>VICTOIRE!</h2>':'<h2>Défaite...</h2>'}<p style="font-size:2em;">${rMS} - ${rOS}</p><p style="font-size:1.1em;">${w?'🎉 Tu gagnes! Le perdant doit: '+rG:'😢 Tu dois: '+rG}</p><button class="btn-action btn-outline" onclick="document.getElementById(\'gameContent\').innerHTML=\'\';document.getElementById(\'gameMenu\').style.display=\'block\';">🔄 REVANCHE</button></div>`;}
        
        // AV
        const avA=["Fais 10 pompes","Imite célébrité","Danse 30s","Chante","Cri animal","Mime métier","Accent étranger","Grimace selfie","Blague mimée","Playback","Tourne 10x","Marche robot","Battle regard","Chuchote secret","Invente chanson","Discours","Mime pub","Talent caché","Massage épaules","Bébé rire","Verlan","Danse TikTok","Yeux fermés","Histoire objets","Gainage"];
        const avV=["Ton rêve?","Ta peur?","Pire date?","Premier crush?","Talent caché?","Au loto?","Plus gros mensonge?","Film préféré?","Plus beau souvenir?","Regret?","Métier enfant?","Citation préférée?","Ce qui te rend heureux?","Pire défaut?","Chose la plus folle?","Livre préféré?","Qualité chez les autres?","Endroit préféré?","Meilleur conseil?","Dîner célébrité?","Plus beau compliment?","Phobie?","Ce qui t'énerve?","Guilty pleasure?","Dernière fois pleuré?"];
        function inviteAV(){document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<h3 style="text-align:center;">🎯 ACTION OU VÉRITÉ</h3><p style="text-align:center;opacity:.6;">Choisis la version:</p><div style="display:flex;gap:15px;justify-content:center;margin:25px;"><button class="btn-action btn-success" onclick="sendAVI('classic')">🎯 CLASSIQUE</button><button class="btn-action btn-danger" onclick="sendAVI('adult')">🔞 ADULTE</button></div>`;}
        function sendAVI(v){socket.emit('av_invite',{match_id:mid,to_user:oid,version:v});document.getElementById('gameContent').innerHTML='<p style="text-align:center;padding:40px;">📤 Invitation envoyée...</p>';}
        socket.on('av_invite_received',(d)=>{document.getElementById('gamePanel').style.display='block';document.getElementById('gameMenu').style.display='none';document.getElementById('gameContent').innerHTML=`<div style="text-align:center;padding:40px;"><span style="font-size:4em;">🎯</span><p style="font-size:1.2em;">{{ other_user.username }} vous invite!</p><div style="margin-top:25px;display:flex;gap:15px;justify-content:center;"><button class="btn-action btn-success" onclick="acceptAV('${d.version}')">✅ ACCEPTER</button><button class="btn-action btn-danger" onclick="declineAV()">❌ REFUSER</button></div></div>`;});
        function acceptAV(v){socket.emit('av_accept',{match_id:mid,to_user:oid,version:v});showAV(v);}
        function declineAV(){socket.emit('av_decline',{match_id:mid,to_user:oid});closeGamePanel();}
        socket.on('av_accepted',(d)=>{showAV(d.version);});
        function showAV(v){document.getElementById('gameContent').innerHTML=`<h4 style="text-align:center;">${v==='adult'?'🔞 ':''}Action ou Vérité</h4><div style="display:flex;gap:15px;justify-content:center;margin:20px;"><button class="btn-action btn-primary" onclick="pickAV('${v}','action')">⚡ ACTION</button><button class="btn-action btn-primary" onclick="pickAV('${v}','verite')">💬 VÉRITÉ</button></div><div id="avR" style="text-align:center;margin-top:20px;"></div>`;}
        function pickAV(v,t){const l=t==='action'?avA:avV;const r=l[Math.floor(Math.random()*l.length)];document.getElementById('avR').innerHTML=`<div class="result-box" style="background:rgba(255,255,255,.02);border:1px solid ${t==='action'?'#ff9800':'#2196F3'};border-radius:20px;"><span style="font-size:3em;">${t==='action'?'⚡':'💬'}</span><h3>${t==='action'?'ACTION':'VÉRITÉ'}</h3><p style="font-size:1.4em;">${r}</p></div><button class="btn-action btn-primary" onclick="pickAV('${v}','${t}')" style="margin-top:15px;">🔄 RELANCER</button>`;socket.emit('av_send',{match_id:mid,to_user:oid,type:t,challenge:r});}
        socket.on('av_receive',(d)=>{document.getElementById('avR').innerHTML=`<div class="result-box" style="background:rgba(255,255,255,.02);border:1px solid ${d.type==='action'?'#ff9800':'#2196F3'};border-radius:20px;"><span style="font-size:3em;">📩</span><h3>${d.type==='action'?'ACTION':'VÉRITÉ'} reçu</h3><p style="font-size:1.4em;">${d.challenge}</p></div>`;});
        
        setInterval(load,2000);load();setTimeout(()=>{document.getElementById('messages').scrollTop=99999;document.getElementById('msgInput').focus();},500);
    </script>

<script src="/static/js/unified-badge.js"></script>
</body>
</html>
