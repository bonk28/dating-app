<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Carte des Rencontres 🗺️</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; }
        .profile-marker {
            width: 50px; height: 50px; border-radius: 50%; background: #f44336;
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; position: absolute;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3); border: 3px solid white;
        }
        .profile-marker:hover { transform: scale(1.2); z-index: 10; }
        .refresh-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #667eea; color: white; border: none;
            border-radius: 25px; font-size: 1em; cursor: pointer; z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="map">
        <h2 style="color:#999;">🗺️ Carte des profils autour de toi</h2>
    </div>
    <button class="refresh-btn" onclick="loadProfiles()">🔄 Rafraîchir</button>
    <script>
        function loadProfiles() {
            const map = document.getElementById('map');
            map.innerHTML = '';
            const profiles = [
                { name: 'Alice', x: '20%', y: '30%' },
                { name: 'Bob', x: '60%', y: '45%' },
                { name: 'Charlie', x: '40%', y: '70%' },
            ];
            profiles.forEach(p => {
                const marker = document.createElement('div');
                marker.className = 'profile-marker';
                marker.style.left = p.x;
                marker.style.top = p.y;
                marker.textContent = p.name[0];
                marker.title = p.name;
                marker.onclick = () => alert('Profil de ' + p.name);
                map.appendChild(marker);
            });
        }
        loadProfiles();
    </script>
<script src="/static/js/notif-badge.js"></script>
</body>
</html>
