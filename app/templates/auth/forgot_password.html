<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        .card{background:white;border-radius:20px;padding:30px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;}
        h2{margin-bottom:15px;}
        input{width:100%;padding:15px;border:2px solid #e0e0e0;border-radius:10px;font-size:1em;margin-bottom:15px;}
        button{width:100%;padding:15px;background:#667eea;color:white;border:none;border-radius:10px;font-size:1.1em;cursor:pointer;font-weight:bold;}
        .flash{background:#4CAF5020;color:#4CAF50;padding:10px;border-radius:8px;margin-bottom:15px;word-break:break-all;}
        a{color:#667eea;text-decoration:none;}
    </style>
</head>
<body>
    <div class="card">
        <h2>🔑 Mot de passe oublié</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="email" name="email" placeholder="Ton adresse email" required>
            <button type="submit">📧 Envoyer le lien</button>
        </form>
        <p style="margin-top:15px;"><a href="/login">← Retour connexion</a></p>
    </div>
</body>
</html>
