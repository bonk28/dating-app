<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planifier un rendez-vous</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 20px; margin: 15px 0; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        .idea-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            border: 2px solid #667eea; border-radius: 10px; background: white;
            cursor: pointer; text-align: left; font-size: 1em;
        }
        .idea-btn:hover { background: #667eea10; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day {
            padding: 10px; text-align: center; border-radius: 5px;
            cursor: pointer; background: #f5f5f5;
        }
        .day:hover { background: #667eea20; }
        .day.selected { background: #667eea; color: white; }
        .invite-btn {
            width: 100%; padding: 15px; background: #4CAF50; color: white;
            border: none; border-radius: 10px; font-size: 1.1em; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📅 Planifier un rendez-vous</h2>
        
        <div class="card">
            <h3>💡 Idées de rendez-vous</h3>
            <button class="idea-btn">☕ Café & discussion</button>
            <button class="idea-btn">🎬 Cinéma</button>
            <button class="idea-btn">🌳 Balade au parc</button>
            <button class="idea-btn">🍽️ Dîner romantique</button>
            <button class="idea-btn" onclick="customIdea()">✨ Idée personnalisée...</button>
        </div>
        
        <div class="card">
            <h3>📆 Choisir une date</h3>
            <div class="calendar" id="calendar"></div>
        </div>
        
        <button class="invite-btn" onclick="sendInvite()">💌 Envoyer l'invitation</button>
    </div>
    
    <script>
        // Mini calendrier
        const days = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
        const cal = document.getElementById('calendar');
        days.forEach(d => {
            const div = document.createElement('div');
            div.textContent = d;
            div.style.fontWeight = 'bold';
            div.style.padding = '5px';
            cal.appendChild(div);
        });
        for (let i = 1; i <= 14; i++) {
            const div = document.createElement('div');
            div.className = 'day';
            div.textContent = i;
            div.onclick = function() {
                document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            };
            cal.appendChild(div);
        }
        
        function customIdea() {
            const idea = prompt('Ton idée de rendez-vous :');
            if (idea) alert('Idée ajoutée : ' + idea);
        }
        
        function sendInvite() {
            const selected = document.querySelector('.day.selected');
            if (selected) {
                alert('✅ Invitation envoyée pour le ' + selected.textContent + ' !');
            } else {
                alert('Sélectionne une date !');
            }
        }
    </script>
</body>
</html>
