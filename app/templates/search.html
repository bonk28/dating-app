<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App | Recherche - Dating App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
        
        .nav a { text-decoration: none; color: #667eea; font-weight: bold; font-size: 0.9em; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .search-box {
            background: white; padding: 25px;
            border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .search-box h2 { margin-bottom: 20px; color: #333; }
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; margin-bottom: 5px; color: #666; font-weight: 500; }
        .filter-group input, .filter-group select {
            width: 100%; padding: 12px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 16px; font-family: inherit;
        }
        .filter-group input:focus, .filter-group select:focus {
            outline: none; border-color: #667eea;
        }
        .range-group { display: flex; gap: 10px; }
        .range-group input { flex: 1; }
        button {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.02); }
        .results { margin-top: 20px; }
        .results h3 { margin-bottom: 15px; color: #333; }
        .user-card {
            background: white; padding: 15px; border-radius: 10px;
            margin-bottom: 10px; display: flex; align-items: center;
            gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer; transition: transform 0.2s;
        }
        .user-card:hover { transform: translateX(5px); }
        .user-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            background: #e0e0e0; display: flex; align-items: center;
            justify-content: center; font-size: 2em; overflow: hidden;
            flex-shrink: 0;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { flex: 1; }
        .user-name { font-weight: bold; color: #333; margin-bottom: 3px; }
        .user-details { color: #666; font-size: 0.9em; }
        .no-results { text-align: center; padding: 50px 20px; color: #999; }
    body{padding-bottom:60px;}

.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;background:rgba(10,10,20,.98);padding:8px 5px 20px;z-index:100;border-top:1px solid rgba(255,255,255,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:rgba(255,255,255,.4);font-size:.6em;gap:2px;padding:5px}
.nav-item span{font-size:1.4em}.nv{font-size:.75em}body{padding-bottom:65px}
</style>
</head>
